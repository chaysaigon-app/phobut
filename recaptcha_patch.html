<!--
  ═══════════════════════════════════════════════════════════════
  PATCH: reCAPTCHA v3 cho index_patch.html
  ═══════════════════════════════════════════════════════════════
  Hướng dẫn tích hợp:
  1. Thêm thẻ <script> reCAPTCHA vào <head> của index.html
  2. Thay thế hàm submitPartnerRequest() trong <script type="module">
  ═══════════════════════════════════════════════════════════════
-->

<!-- ═══════════════════════════════════════════════════════════
     BƯỚC 1 — Dán vào <head> của index.html
     (Thay "YOUR_RECAPTCHA_SITE_KEY" bằng Site Key thật)
     ═══════════════════════════════════════════════════════════ -->
<script src="https://www.google.com/recaptcha/api.js?render=YOUR_RECAPTCHA_SITE_KEY" async defer></script>


<!-- ═══════════════════════════════════════════════════════════
     BƯỚC 2 — Thay thế hàm submitPartnerRequest() cũ
     trong <script type="module"> của index_patch.html / index.html
     ═══════════════════════════════════════════════════════════ -->
<script type="module">

// ── Hằng số Site Key — thay bằng key thật của bạn ────────────
const RECAPTCHA_SITE_KEY = "YOUR_RECAPTCHA_SITE_KEY";

// ════════════════════════════════════════════════════════════
// submitPartnerRequest() — Phiên bản có reCAPTCHA v3
// ════════════════════════════════════════════════════════════
window.submitPartnerRequest = async () => {
  const restaurantName = document.getElementById("pm-restaurant").value.trim();
  const ownerName      = document.getElementById("pm-owner").value.trim();
  const email          = document.getElementById("pm-email").value.trim();
  const phone          = document.getElementById("pm-phone").value.trim();
  const address        = document.getElementById("pm-address").value.trim();
  const errEl          = document.getElementById("pm-err");

  // ── Validate phía client ─────────────────────────────────
  if (!restaurantName || !ownerName || !email || !phone) {
    errEl.textContent   = "Vui lòng điền đầy đủ các trường bắt buộc (*)";
    errEl.style.display = "block";
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errEl.textContent   = "Email không hợp lệ";
    errEl.style.display = "block";
    return;
  }

  const btn = document.getElementById("pm-submit-btn");
  btn.disabled    = true;
  btn.textContent = "Đang xác thực...";
  errEl.style.display = "none";

  try {
    // ── Lấy reCAPTCHA v3 token ────────────────────────────
    // grecaptcha.execute() trả về token dạng JWT string
    // action giúp phân biệt điểm gọi trên dashboard reCAPTCHA
    const recaptchaToken = await new Promise((resolve, reject) => {
      // Chờ grecaptcha sẵn sàng (script có thể chưa load xong)
      if (typeof grecaptcha === "undefined") {
        reject(new Error("reCAPTCHA chưa tải xong. Vui lòng thử lại."));
        return;
      }
      grecaptcha.ready(async () => {
        try {
          const token = await grecaptcha.execute(RECAPTCHA_SITE_KEY, {
            action: "partner_registration"   // tên action — xem trong dashboard reCAPTCHA
          });
          resolve(token);
        } catch (e) {
          reject(e);
        }
      });
    });

    btn.textContent = "Đang gửi...";

    // ── Ghi vào Firestore kèm token ──────────────────────
    // Token được lưu để backend / Cloud Function verify sau.
    // Score >= 0.5 → người thật; < 0.5 → nghi bot.
    // (Verify token trên server bằng: POST https://recaptchaenterprise.googleapis.com/...)
    await addDoc(collection(db, "PartnerRequests"), {
      restaurantName,
      ownerName,
      email,
      phone,
      address:          address || null,
      status:           "pending",
      recaptchaToken,                       // ← token reCAPTCHA v3
      recaptchaAction:  "partner_registration",
      createdAt:        serverTimestamp()
    });

    // ── Thành công ───────────────────────────────────────
    document.getElementById("pm-form-wrap").style.display    = "none";
    document.getElementById("pm-success-wrap").style.display = "block";

  } catch (e) {
    // Phân loại lỗi để hiển thị thông báo phù hợp
    const msg = e.message.includes("reCAPTCHA")
      ? e.message
      : "Lỗi gửi đăng ký: " + e.message;
    errEl.textContent   = msg;
    errEl.style.display = "block";
    console.error("submitPartnerRequest:", e);
  } finally {
    btn.disabled    = false;
    btn.textContent = "Gửi đăng ký →";
  }
};

</script>
