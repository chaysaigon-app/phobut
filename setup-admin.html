<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>⚙️ Setup Admin Account</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0a0a0f;color:#dde4f5;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#131924;border:1px solid #2c3450;border-radius:16px;padding:32px;width:100%;max-width:440px}
h1{font-size:20px;font-weight:700;color:#ff6b35;margin-bottom:6px}
.sub{font-size:13px;color:#7a8eb0;margin-bottom:24px;line-height:1.6}
label{display:block;font-size:11px;font-weight:700;color:#7a8eb0;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;margin-top:14px}
input{width:100%;padding:11px 14px;background:#1c2233;border:1.5px solid #2c3450;border-radius:8px;color:#fff;font-size:14px;outline:none;transition:border-color .2s}
input:focus{border-color:#ff6b35}
.btn{display:block;width:100%;margin-top:20px;padding:13px;background:#ff6b35;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn:hover{background:#ff8c5a}
.btn:disabled{background:#3d4f70;cursor:not-allowed}
#status{margin-top:16px;padding:14px;border-radius:8px;font-size:13px;line-height:1.8;display:none;white-space:pre-wrap}
.ok{background:rgba(0,217,126,.1);border:1px solid #00d97e;color:#00d97e}
.err{background:rgba(255,71,102,.1);border:1px solid #ff4766;color:#ff4766}
.inf{background:rgba(79,156,255,.1);border:1px solid #4f9cff;color:#4f9cff}
.step{font-size:12px;margin-bottom:4px}
hr{border:none;border-top:1px solid #2c3450;margin:20px 0}
.warn-box{background:rgba(255,203,71,.1);border:1px solid #ffcb47;border-radius:8px;padding:12px;font-size:12px;color:#ffcb47;margin-bottom:20px;line-height:1.6}
</style>
</head>
<body>
<div class="card">
  <h1>⚙️ Tạo tài khoản Super Admin</h1>
  <p class="sub">Dùng một lần để tạo tài khoản đăng nhập cho admin-dashboard.<br>Xóa file này sau khi dùng xong.</p>

  <div class="warn-box">
    ⚠️ Chỉ chạy file này trên <strong>localhost / firebase serve</strong><br>
    Không upload lên hosting public
  </div>

  <label>Email Super Admin</label>
  <input id="email" type="email" value="chaysaigon@gmail.com" placeholder="chaysaigon@gmail.com">

  <label>Mật khẩu (tối thiểu 6 ký tự)</label>
  <input id="pw" type="password" placeholder="Đặt mật khẩu mạnh..." id="pw">

  <label>Xác nhận mật khẩu</label>
  <input id="pw2" type="password" placeholder="Nhập lại mật khẩu...">

  <button class="btn" id="btn-create" onclick="createAdmin()">🚀 Tạo tài khoản Admin</button>

  <hr>

  <div style="font-size:12px;color:#7a8eb0;margin-bottom:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Hoặc — Test đăng nhập</div>
  <label>Mật khẩu để test</label>
  <input id="test-pw" type="password" placeholder="Nhập mật khẩu để test đăng nhập">
  <button class="btn" style="background:#1a4a7a;margin-top:10px" onclick="testLogin()">🔑 Test đăng nhập</button>

  <div id="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail }
  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyA0zujbTZbHe_7gAe_y9QkrcR4qXKC6Abo",
  authDomain:        "phobut-95574.firebaseapp.com",
  projectId:         "phobut-95574",
  storageBucket:     "phobut-95574.appspot.com",
  messagingSenderId: "1074182475091",
  appId:             "1:1074182475091:web:32ad6ef9717256b88f25a6"
};

const app  = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);

function show(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = type; el.style.display = 'block';
}

window.createAdmin = async () => {
  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('pw').value;
  const pw2   = document.getElementById('pw2').value;
  const btn   = document.getElementById('btn-create');

  if (!email)          return show('❌ Nhập email', 'err');
  if (pw.length < 6)   return show('❌ Mật khẩu tối thiểu 6 ký tự', 'err');
  if (pw !== pw2)      return show('❌ Hai mật khẩu không khớp', 'err');

  btn.disabled = true; btn.textContent = 'Đang tạo...';
  show('⏳ Đang kết nối Firebase...', 'inf');

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pw);
    show(
      `✅ TẠO THÀNH CÔNG!\n\nEmail: ${cred.user.email}\nUID: ${cred.user.uid}\n\n` +
      `→ Giờ mở admin-dashboard.html và đăng nhập bằng email/mật khẩu vừa tạo.\n` +
      `→ Xóa file setup-admin.html này sau khi dùng xong.`,
      'ok'
    );
  } catch(err) {
    const code = err.code || '';
    if (code === 'auth/email-already-in-use') {
      show(
        `⚠️ Email này đã có tài khoản rồi!\n\n` +
        `→ Thử test đăng nhập bên dưới.\n` +
        `→ Nếu quên mật khẩu: nhấn nút "Gửi email reset" bên dưới.`,
        'inf'
      );
      document.getElementById('reset-btn').style.display = 'block';
    } else if (code === 'auth/unauthorized-domain') {
      show(
        `❌ Domain chưa được phép!\n\nURL hiện tại: ${location.href}\n\n` +
        `→ Vào Firebase Console → Authentication → Settings → Authorized domains\n` +
        `→ Thêm: ${location.hostname}\n` +
        `→ Hoặc chạy qua: firebase serve (localhost)`,
        'err'
      );
    } else if (code === 'auth/network-request-failed') {
      show('❌ Lỗi mạng. Kiểm tra kết nối internet.', 'err');
    } else {
      show(`❌ Lỗi: ${err.code}\n${err.message}`, 'err');
    }
  }
  btn.disabled = false; btn.textContent = '🚀 Tạo tài khoản Admin';
};

window.testLogin = async () => {
  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('test-pw').value;
  if (!pw) return show('❌ Nhập mật khẩu để test', 'err');

  show('⏳ Đang thử đăng nhập...', 'inf');
  try {
    const cred = await signInWithEmailAndPassword(auth, email, pw);
    show(
      `✅ ĐĂNG NHẬP OK!\n\nEmail: ${cred.user.email}\nUID: ${cred.user.uid}\n\n` +
      `→ Mở admin-dashboard.html và dùng email/mật khẩu này để đăng nhập.`,
      'ok'
    );
  } catch(err) {
    const code = err.code || '';
    const msgs = {
      'auth/invalid-credential':      '❌ Sai mật khẩu',
      'auth/wrong-password':          '❌ Sai mật khẩu',
      'auth/user-not-found':          '❌ Email chưa có tài khoản → dùng form Tạo tài khoản bên trên',
      'auth/too-many-requests':       '❌ Bị tạm lock do thử quá nhiều lần → đợi 5 phút hoặc reset mật khẩu',
      'auth/user-disabled':           '❌ Tài khoản bị vô hiệu hóa',
      'auth/network-request-failed':  '❌ Lỗi mạng',
      'auth/unauthorized-domain':     `❌ Domain chưa được phép\n→ Thêm "${location.hostname}" vào Firebase Console → Auth → Authorized domains`,
    };
    show(msgs[code] || `❌ Lỗi: ${code}\n${err.message}`, 'err');
  }
};

window.resetPassword = async () => {
  const email = document.getElementById('email').value.trim();
  if (!email) return show('❌ Nhập email', 'err');
  try {
    await sendPasswordResetEmail(auth, email);
    show(`✅ Đã gửi email reset mật khẩu tới ${email}\nKiểm tra hộp thư (kể cả spam).`, 'ok');
  } catch(err) {
    show(`❌ ${err.code}: ${err.message}`, 'err');
  }
};
</script>

<!-- Reset button hidden by default -->
<script>
document.addEventListener('DOMContentLoaded', () => {
  const btn = document.createElement('button');
  btn.id = 'reset-btn';
  btn.className = 'btn';
  btn.style.cssText = 'background:#1a3a6e;margin-top:8px;display:none';
  btn.textContent = '📧 Gửi email reset mật khẩu';
  btn.onclick = () => window.resetPassword();
  document.querySelector('.card').appendChild(btn);
});
</script>
</body>
</html>
