// -- IMAGE COMPRESSION (Giữ nguyên) --
function compressImage(file, maxWidth = 800, quality = 0.82, outputType = 'image/webp') {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Không đọc được file ảnh'));
    reader.onload  = ev => {
      const img = new Image();
      img.onerror = () => reject(new Error('File không phải ảnh hợp lệ'));
      img.onload  = () => {
        let { width, height } = img;
        if (width > maxWidth) { height = Math.round(height * maxWidth / width); width = maxWidth; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob(blob => { if (!blob) reject(new Error('toBlob failed')); else resolve(blob); }, outputType, quality);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadToCloudinary(file, onProgress) {
  onProgress(10);
  let blob;
  try {
    blob = await compressImage(file);
    const oKB = Math.round(file.size / 1024), cKB = Math.round(blob.size / 1024);
    const inf = document.getElementById('compress-info');
    if (inf) inf.textContent = `✓ Nén: ${oKB}KB → ${cKB}KB`;
  } catch(err) { console.warn('Compress fallback:', err); blob = file; }
  onProgress(30);
  const fd = new FormData();
  fd.append('file', blob, file.name.replace(/\.[^.]+$/, '.webp'));
  fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
  fd.append('folder', 'menu_items');
  onProgress(60);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
  onProgress(90);
  if (!res.ok) throw new Error(`Cloudinary HTTP ${res.status}`);
  const data = await res.json();
  onProgress(100);
  return data.secure_url;
}

window.doLogout = () => signOut(auth);

onAuthStateChanged(auth, async user => {
  if (!user) { document.getElementById('auth').style.display = 'flex'; return; }
  me = user; isSA = user.email === SUPER_ADMIN_EMAIL;
  document.getElementById('auth').style.display = 'none';
  document.getElementById('sav').textContent    = user.email[0].toUpperCase();
  document.getElementById('sue').textContent    = user.email;
  document.getElementById('sa-s').style.display = isSA ? '' : 'none';
  document.getElementById('n-br').style.display = isSA ? '' : 'none';
  await loadBranches(user);
});

async function loadBranches(user) {
  try {
    const snap = await getDocs(collection(db, 'Branches'));
    allBranches = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const sel = document.getElementById('brs');
    sel.innerHTML = '';
    if (isSA) {
      myRole = 'admin';
      sel.innerHTML = '<option value="all">🌐 Tất cả chi nhánh (HQ)</option>' +
        allBranches.map(b => `<option value="${b.id}">${b.info?.name || b.id}</option>`).join('');
    } else {
      const myB = [];
      for (const b of allBranches) {
        const sd = await getDoc(doc(db, 'Branches', b.id, 'Staff', user.email));
        if (sd.exists()) myB.push({ ...b, role: sd.data().role });
      }
      if (!myB.length) { showT('Không có quyền vào hệ thống', 'err'); signOut(auth); return; }
      sel.innerHTML = myB.map(b => `<option value="${b.id}" data-role="${b.role}">${b.info?.name || b.id}</option>`).join('');
      myRole = myB[0].role;
    }
    if (sel.options.length) { sel.selectedIndex = 0; onBrCh(); }
  } catch(e) { showT('Lỗi: ' + e.message, 'err'); }
}

window.onBrCh = () => {
  const sel = document.getElementById('brs');
  const opt = sel.options[sel.selectedIndex];
  curBrId = opt.value; curBrName = curBrId === 'all' ? 'Tất cả chi nhánh' : opt.text;
  if (!isSA && opt.dataset.role) myRole = opt.dataset.role;
  document.getElementById('sur').textContent = isSA ? 'Super Admin' : (myRole === 'admin' ? 'Partner Admin' : 'Staff');
  if (curBrId) goP(curPage);
};

const PTITLES = { dashboard: '📊 Dashboard', orders: '📋 Đơn hàng', menu: '🍽️ Thực đơn & Kho', staff: '👥 Nhân viên', vouchers: '🎟️ Voucher', branches: '🏢 Quản lý Đối tác', settings: '⚙️ Cài đặt' };
window.goP = async p => {
  curPage = p;
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('on'));
  document.getElementById('pg-ttl').textContent = PTITLES[p] || p;
  document.getElementById('pg-acts').innerHTML  = '';
  document.getElementById('pg-c').innerHTML = '<div class="ldr"><div class="spin"></div><span>Đang tải...</span></div>';
  
  if (!curBrId && p !== 'branches') { document.getElementById('pg-c').innerHTML = '<div class="ldr">Chọn chi nhánh</div>'; return; }
  try {
    if      (p === 'dashboard') await rDash();
    else if (p === 'orders')    await rOrders();
    else if (p === 'menu')      await rMenu();
    else if (p === 'staff')     await rStaff();
    else if (p === 'vouchers')  await rVouchers();
    else if (p === 'branches')  await rBranches();
    else if (p === 'settings')  await rSettings();

};

// -- DASHBOARD (Giữ nguyên) --
async function rDash() {
  const today = new Date(); today.setHours(0,0,0,0);
  const from  = new Date(today); from.setDate(today.getDate() - 30);
  const brIds = getBranchIds(); 
  allOrders = [];
  for (const bId of brIds) {
    const oSnap = await getDocs(query(collection(db, 'Branches', bId, 'Orders'), orderBy('createdAt','desc'), limit(500)));
    oSnap.docs.forEach(d => allOrders.push({ id:d.id, branchId:bId, ...d.data() }));
  }
  const done = allOrders.filter(o => ['completed','paid','delivered'].includes(o.status));
  const totR = done.reduce((s,o) => s+(o.total||0), 0);
  document.getElementById('pg-c').innerHTML = `
    <div class="kg">
      <div class="kc or"><div class="ki">💰</div><div class="kl">Doanh thu</div><div class="kv" style="color:var(--acc)">${fmt(totR)}</div></div>
      <div class="kc pu"><div class="ki">🧾</div><div class="kl">Tổng đơn hoàn thành</div><div class="kv" style="color:var(--pur)">${done.length}</div></div>
    </div>
  `;
}

// ── 1. CẬP NHẬT RORDERS: Đọc tất cả nếu là HQ, không cho sửa ──
async function rOrders() {
  const SL = {pending:'Chờ XN',paid:'Đã TT',preparing:'Chuẩn bị',delivering:'Giao hàng',delivered:'Đã giao',completed:'Hoàn thành',cancelled:'Đã hủy'};
  const SC = {pending:'var(--ylw)',paid:'var(--grn)',preparing:'var(--blu)',delivering:'var(--pur)',delivered:'#c8a7ff',completed:'#4dffa6',cancelled:'var(--red)'};
  const SF = ['pending','paid','preparing','delivering','delivered','completed','cancelled'];

  let orders = [];
  if (curBrId === 'all') {
    // HQ: Quét tất cả các chi nhánh
    for(const b of allBranches) {
      if(b.isPartnerApproved) {
        const snap = await getDocs(query(collection(db,'Branches',b.id,'Orders'), orderBy('createdAt','desc'), limit(50)));
        snap.docs.forEach(d => orders.push({ id:d.id, branchName: b.info?.name, branchId: b.id, ...d.data() }));
      }
    }
    // Sắp xếp tổng hợp theo thời gian mới nhất
    orders.sort((a,b) => (b.createdAt?.toMillis()||0) - (a.createdAt?.toMillis()||0));
  } else {
    const snap = await getDocs(query(collection(db,'Branches',curBrId,'Orders'), orderBy('createdAt','desc'), limit(100)));
    orders = snap.docs.map(d => ({ id:d.id, branchName: curBrName, branchId: curBrId, ...d.data() }));
  }

  const rows = orders.map(o => {
    const ts = o.createdAt?.toDate?.(); const s = o.status || 'pending';
    const opts = SF.map(st => `<option value="${st}" ${st===s?'selected':''}>${SL[st]}</option>`).join('');
    const chIco = {dinein:'🪑',takeaway:'🥡',weborder:'🌐',apporder:'📱'}[o.orderType] || '';
    
    // Nếu HQ xem (curBrId == 'all'), chỉ hiện Text, không hiện thẻ Select
    const statusHtml = curBrId === 'all' 
      ? `<span class="bdg" style="background:${SC[s]}18;color:${SC[s]}">${SL[s]||s}</span>`
      : `<select style="background:var(--s3);border:1px solid var(--brd);border-radius:6px;padding:4px;color:var(--txt);font-size:11px;font-family:var(--font)" onchange="updSt('${o.branchId}', '${o.id}', this.value)">${opts}</select>`;

    return `<tr>
      <td><span style="font-family:var(--mono);font-size:11px">#${o.id.slice(-6).toUpperCase()}</span></td>
      ${curBrId === 'all' ? `<td><strong style="color:var(--blu)">${o.branchName||'—'}</strong></td>` : ''}
      <td style="font-size:12px">${ts?ts.toLocaleString('vi-VN'):'—'}</td>
      <td>${chIco} ${o.orderType||'—'}</td>
      <td style="font-family:var(--mono);font-weight:700;color:var(--acc)">${fmt(o.total)}</td>
      <td>${statusHtml}</td>
    </tr>`;
  }).join('');

  document.getElementById('pg-c').innerHTML = `
  <div class="cvd" style="overflow-x:auto">
    <table class="dt"><thead><tr><th>Mã đơn</th>${curBrId === 'all' ? '<th>Chi nhánh</th>' : ''}<th>Thời gian</th><th>Kênh</th><th>Tổng</th><th>Cập nhật trạng thái</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="6" style="text-align:center;padding:24px">Chưa có đơn</td></tr>'}</tbody></table>
  </div>`;
}

window.updSt = async (bId, id, s) => {

  try { await updateDoc(doc(db,'Branches',bId,'Orders',id), {status:s, updatedAt:serverTimestamp()}); showT('Đã cập nhật','ok'); }

// Hàm duyệt đối tác: Chuyển Request thành Branch
window.approvePartner = async (reqId) => {
  if(!confirm("Bạn có chắc chắn muốn duyệt quán này và cấp tài khoản Admin cho họ không?")) return;
  try {
    const reqDoc = await getDoc(doc(db, "PartnerRequests", reqId));
    if(!reqDoc.exists()) return;
    const req = reqDoc.data();

    // 1. Tạo Branch mới
    const newBranchRef = await addDoc(collection(db, "Branches"), {
      isPartnerApproved: true,
      isOpen: false, // Mặc định đóng cửa để họ set up menu trước
      info: {
        name: req.restaurantName,
        owner: req.ownerName,
        phone: req.phone,
        email: req.email,
        address: req.address || "",
        vat: DEFAULT_VAT
      },
      createdAt: serverTimestamp()
    });

    // 2. Tạo Staff/Admin role
    await setDoc(doc(db, "Branches", newBranchRef.id, "Staff", req.email), {
      name: req.ownerName,
      role: "admin",
      addedAt: serverTimestamp()
    });

    // 3. Đánh dấu Request là approved
    await updateDoc(doc(db, "PartnerRequests", reqId), { status: "approved" });

    showT(`✅ Đã duyệt! Quán "${req.restaurantName}" đã được cấp tài khoản.`, "ok");
    loadBranches(me); // Reload dropdown
    rBranches(); // Reload table
  } catch(e) {
    showT("Lỗi duyệt quán: " + e.message, "err");
  }
};
