<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin — Vegans Da Nang</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
:root{
  --bg:#07090e;--s1:#0c1018;--s2:#131924;--s3:#1a2232;--s4:#1f2a3c;
  --brd:#283450;--brd2:#1a2232;
  --acc:#ff6b35;--acc2:#ff8c5a;--acc-d:rgba(255,107,53,.12);
  --grn:#00d97e;--grn-d:rgba(0,217,126,.12);
  --blu:#4f9cff;--blu-d:rgba(79,156,255,.12);
  --red:#ff4766;--red-d:rgba(255,71,102,.12);
  --ylw:#ffcb47;--ylw-d:rgba(255,203,71,.12);
  --pur:#b06fff;--pur-d:rgba(176,111,255,.12);
  --txt:#dde4f5;--txt2:#7a8eb0;--txt3:#3d4f70;
  --font:'Be Vietnam Pro',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:10px;--r2:16px;--sh:0 8px 32px rgba(0,0,0,.5);--sw:220px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:var(--font);font-size:14px;height:100vh;display:flex;overflow:hidden}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:var(--font);color:var(--txt);background:none}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px}

/* AUTH */
#auth{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;padding:24px}
.ac{width:100%;max-width:360px;background:var(--s1);border:1px solid var(--brd);border-radius:20px;padding:44px 36px}
.al{text-align:center;margin-bottom:24px}.al-ico{font-size:40px;margin-bottom:8px}
.al h1{font-size:26px;font-weight:900;color:var(--acc);letter-spacing:-1px}
.al p{color:var(--txt2);font-size:13px;margin-top:4px}
.afl{margin-bottom:12px}
.afl label{display:block;font-size:11px;font-weight:700;color:var(--txt2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.afl input{width:100%;background:var(--s3);border:1px solid var(--brd);border-radius:var(--r);padding:11px 14px;color:var(--txt);font-size:14px;outline:none;transition:border-color .2s}
.afl input:focus{border-color:var(--acc)}
.ap{width:100%;background:var(--acc);color:#fff;border-radius:var(--r);padding:12px;font-weight:800;font-size:15px}
.ap:hover{background:var(--acc2)}
#ae{color:var(--red);font-size:12px;text-align:center;min-height:16px;margin-top:8px}

/* SIDEBAR */
#sb{width:var(--sw);background:var(--s1);border-right:1px solid var(--brd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-br{padding:14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px}
.sb-ico{font-size:20px}.sb-txt{font-weight:900;font-size:14px}
#br-sel{padding:8px;border-bottom:1px solid var(--brd);flex-shrink:0}
#br-sel select{width:100%;background:var(--s3);border:1px solid var(--brd);border-radius:8px;padding:7px 10px;color:var(--txt);font-size:12px;outline:none}
.sbn{flex:1;overflow-y:auto;padding:6px}
.ni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--txt2);font-weight:500;font-size:13px;transition:all .15s;margin-bottom:2px;width:100%;text-align:left}
.ni:hover{background:var(--s3);color:var(--txt)}.ni.on{background:var(--acc-d);color:var(--acc)}
.ni .ico{font-size:15px;width:20px;text-align:center}
.ns{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;padding:12px 12px 4px;margin-top:4px}
.sb-bot{padding:10px;border-top:1px solid var(--brd)}
.su{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;background:var(--s3)}
.sav{width:30px;height:30px;border-radius:50%;background:var(--acc-d);border:2px solid var(--acc);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--acc);flex-shrink:0}
.sui{flex:1;overflow:hidden}.sue{font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.sur{font-size:10px;color:var(--txt3)}
.lout{margin-top:8px;width:100%;background:none;border:1px solid var(--brd);color:var(--txt2);border-radius:8px;padding:7px;font-size:12px;transition:all .15s}
.lout:hover{border-color:var(--red);color:var(--red)}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#pg-hdr{padding:14px 24px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
#pg-ttl{font-size:19px;font-weight:800;letter-spacing:-0.5px;flex-shrink:0}
#pg-acts{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.hdr-btn{display:flex;align-items:center;gap:6px;background:var(--s3);border:1px solid var(--brd);color:var(--txt2);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;transition:all .15s}
.hdr-btn:hover{border-color:var(--acc);color:var(--acc)}
.bs-acc{background:var(--acc);border:1px solid var(--acc);color:#fff;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700}
.bs-acc:hover{background:var(--acc2)}
#pg-c{flex:1;overflow-y:auto;padding:20px 24px}

/* CARDS */
.kg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.kc{background:var(--s2);border:1px solid var(--brd);border-radius:var(--r2);padding:16px;position:relative;overflow:hidden}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kc.or::before{background:var(--acc)}.kc.gr::before{background:var(--grn)}.kc.bl::before{background:var(--blu)}.kc.pu::before{background:var(--pur)}.kc.re::before{background:var(--red)}
.kl{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kv{font-family:var(--mono);font-size:20px;font-weight:700;margin-bottom:4px}
.ks{font-size:11px;color:var(--txt3)}.ki{position:absolute;right:12px;top:12px;font-size:22px;opacity:.18}

/* TABLES */
.cvd{background:var(--s2);border:1px solid var(--brd);border-radius:var(--r2);padding:16px;margin-bottom:14px}
.df{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.df label{font-size:12px;color:var(--txt2);font-weight:600}
.df input,.df select{background:var(--s3);border:1px solid var(--brd);border-radius:8px;padding:6px 10px;color:var(--txt);font-size:12px;outline:none}
.df input:focus,.df select:focus{border-color:var(--acc)}
.df-btn{background:var(--acc-d);border:1px solid var(--acc);color:var(--acc);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700}
.dt{width:100%;border-collapse:collapse;font-size:13px}
.dt th{text-align:left;padding:10px 12px;font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--brd)}
.dt td{padding:10px 12px;border-bottom:1px solid var(--brd2);vertical-align:middle}
.dt tr:hover td{background:var(--s3)}.dt tr:last-child td{border-bottom:none}
.bdg{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
.bact{background:var(--grn-d);color:var(--grn)}.bins{background:var(--red-d);color:var(--red)}
.bpnd{background:var(--ylw-d);color:var(--ylw)}.badm{background:var(--acc-d);color:var(--acc)}
.bhid{background:var(--txt3);color:var(--bg);opacity:.7}

/* FORMS */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ff{display:flex;flex-direction:column;gap:5px}.ff.full{grid-column:1/-1}
.ff label{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px}
.ff input,.ff select,.ff textarea{background:var(--s3);border:1px solid var(--brd);border-radius:var(--r);padding:9px 12px;color:var(--txt);font-size:13px;outline:none;transition:border-color .2s}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--acc)}
.ff textarea{resize:vertical;min-height:70px}
.fa{display:flex;gap:8px;margin-top:16px}
.fcn{background:none;border:1px solid var(--brd);color:var(--txt2);border-radius:var(--r);padding:8px 18px;font-size:13px;font-weight:600}
.fsv{background:var(--acc);border:none;color:#fff;border-radius:var(--r);padding:8px 22px;font-size:13px;font-weight:700}
.fsv:hover{background:var(--acc2)}
.fsv.green{background:var(--grn);color:#000}
.fsv.red{background:var(--red)}

/* TOGGLE */
.tog-wrap{display:flex;align-items:center;gap:8px}
.tog{position:relative;width:40px;height:22px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-sl{position:absolute;inset:0;background:var(--s4);border-radius:11px;cursor:pointer;transition:.25s;border:1px solid var(--brd)}
.tog-sl::before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:var(--txt3);left:2px;top:2px;transition:.25s}
.tog input:checked + .tog-sl{background:var(--grn);border-color:var(--grn)}
.tog input:checked + .tog-sl::before{transform:translateX(18px);background:#fff}
.tog-lbl{font-size:12px;color:var(--txt2);font-weight:600}

/* IMAGE UPLOAD */
.iua{border:2px dashed var(--brd);border-radius:var(--r);padding:18px;text-align:center;cursor:pointer;transition:border-color .2s;position:relative}
.iua:hover{border-color:var(--acc)}
.iua img{max-height:90px;max-width:100%;border-radius:6px;margin:0 auto 8px}
.iua p{font-size:12px;color:var(--txt3)}
.iua input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upb{height:3px;background:var(--s4);border-radius:2px;margin-top:6px;overflow:hidden}
.upbf{height:100%;background:var(--acc);width:0;transition:width .3s}

/* MODAL */
#mo{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
#mo.open{display:flex}
.mod{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r2);padding:24px;width:580px;max-width:100%;max-height:90vh;overflow-y:auto;position:relative}
.mod h3{font-size:16px;font-weight:800;margin-bottom:18px}
.mclose{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--txt2);font-size:19px;cursor:pointer}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:var(--s1);border:1px solid var(--brd);border-radius:10px;padding:11px 18px;font-size:13px;font-weight:500;z-index:9999;transform:translateY(60px);opacity:0;transition:all .28s;box-shadow:var(--sh)}
#toast.show{transform:translateY(0);opacity:1}
#toast.ok{border-color:var(--grn);color:var(--grn)}#toast.err{border-color:var(--red);color:var(--red)}#toast.inf{border-color:var(--blu);color:var(--blu)}
.spin{width:22px;height:22px;border:3px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ldr{display:flex;align-items:center;justify-content:center;gap:12px;padding:36px;color:var(--txt2)}
</style>
</head>
<body>

<div id="auth">
  <div class="ac">
    <div class="al">
      <div class="al-ico" id="auth-ico">🌿</div>
      <h1 id="auth-title">Admin</h1>
      <p>Bảng điều khiển quản trị hệ thống</p>
    </div>
    <div class="afl"><label>Email</label><input id="ai-em" type="email" placeholder="admin@email.com"/></div>
    <div class="afl"><label>Mật khẩu</label><input id="ai-pw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="ap" onclick="doLogin()">Đăng nhập</button>
    <div id="ae" style="font-size:12px;min-height:16px;margin-top:8px;line-height:1.5"></div>
  </div>
</div>

<div id="sb">
  <div class="sb-br"><div class="sb-ico" id="sb-ico">🌿</div><div class="sb-txt" id="sb-name">Admin</div></div>
  <div id="br-sel"><select id="brs" onchange="onBrCh()"><option>Đang tải...</option></select></div>
  <nav class="sbn">
    <div class="ns">Tổng quan</div>
    <button class="ni on" onclick="goP('dashboard')"><span class="ico">📊</span>Dashboard</button>
    <button class="ni" onclick="goP('orders')"><span class="ico">📋</span>Đơn hàng</button>
    <div class="ns">Quản lý Quán</div>
    <button class="ni" onclick="goP('menu')"><span class="ico">🍽️</span>Thực đơn & Kho</button>
    <button class="ni" onclick="goP('staff')"><span class="ico">👥</span>Nhân viên</button>
    <button class="ni" onclick="goP('vouchers')"><span class="ico">🎟️</span>Voucher</button>
    <button class="ni" onclick="goP('settings')"><span class="ico">⚙️</span>Cài đặt Quán</button>
    <div class="ns" id="sa-section" style="display:none">Hệ thống HQ</div>
    <button class="ni" id="n-branches" style="display:none" onclick="goP('branches')"><span class="ico">🏢</span>Quản lý Đối tác</button>
    <button class="ni" id="n-requests" style="display:none" onclick="goP('requests')"><span class="ico">📥</span>Yêu cầu đăng ký</button>
    <button class="ni" id="n-import" style="display:none" onclick="goP('import')"><span class="ico">📦</span>Batch Import</button>
  </nav>
  <div class="sb-bot">
    <div class="su"><div class="sav" id="sav">?</div><div class="sui"><div class="sue" id="sue"></div><div class="sur" id="sur"></div></div></div>
    <button class="lout" onclick="doLogout()">Đăng xuất</button>
  </div>
</div>

<div id="main">
  <div id="pg-hdr"><div id="pg-ttl">Dashboard</div><div id="pg-acts"></div></div>
  <div id="pg-c"><div class="ldr"><div class="spin"></div><span>Đang tải...</span></div></div>
</div>

<div id="mo" onclick="closeMo(event)">
  <div class="mod" id="mod-box"><button class="mclose" onclick="closeMo2()">✕</button><div id="mod-c"></div></div>
</div>
<div id="toast"></div>

<script type="module">
import {
  FIREBASE_CONFIG, SUPER_ADMIN_EMAIL,
  CLOUDINARY_CLOUD_NAME, CLOUDINARY_UPLOAD_PRESET,
  EMAILJS_CONFIG, APP_NAME, APP_LOGO_EMOJI, DEFAULT_VAT
} from './config.js';

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
import { getFirestore, collection, doc, getDocs, getDoc, addDoc, setDoc,
         updateDoc, deleteDoc, query, orderBy, serverTimestamp, limit, where, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

const fbApp = initializeApp(FIREBASE_CONFIG);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);

document.getElementById('auth-ico').textContent  = APP_LOGO_EMOJI;
document.getElementById('auth-title').textContent = APP_NAME + ' Admin';
document.getElementById('sb-ico').textContent    = APP_LOGO_EMOJI;
document.getElementById('sb-name').textContent   = APP_NAME;
document.title = APP_NAME + ' — Admin';

// ── IMAGE COMPRESS / UPLOAD ──
function compressImage(file, maxWidth=800, quality=0.82) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onerror = () => rej(new Error('Không đọc được file'));
    reader.onload  = ev => {
      const img = new Image();
      img.onerror = () => rej(new Error('Không phải ảnh hợp lệ'));
      img.onload  = () => {
        let {width, height} = img;
        if (width > maxWidth) { height = Math.round(height*maxWidth/width); width = maxWidth; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0,0,width,height);
        ctx.drawImage(img,0,0,width,height);
        canvas.toBlob(blob => blob ? res(blob) : rej(new Error('toBlob failed')), 'image/webp', quality);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadToCloudinary(file, onProg) {
  onProg(10);
  let blob;
  try { blob = await compressImage(file); } catch { blob = file; }
  onProg(40);
  const fd = new FormData();
  fd.append('file', blob, 'img.webp');
  fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
  fd.append('folder', 'vegans_dn');
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { method:'POST', body:fd });
  onProg(90);
  if (!res.ok) throw new Error(`Cloudinary error ${res.status}`);
  const data = await res.json();
  onProg(100);
  return data.secure_url;
}

// ── STATE ──
let me = null, myRole = null, isSA = false;
let curBrId = null, curBrName = '';
let allBranches = [];
let curPage = 'dashboard';
let _mImgUrl = '', _brImgUrl = '';

// ── AUTH ──
window.doLogin = async () => {
  const errEl = document.getElementById('ae');
  errEl.textContent = '';
  const email = document.getElementById('ai-em').value.trim();
  const pw    = document.getElementById('ai-pw').value;
  if (!email || !pw) { errEl.textContent = 'Nhập email và mật khẩu.'; return; }
  try {
    await signInWithEmailAndPassword(auth, email, pw);
  } catch(err) {
    const code = err.code || '';
    if (code === 'auth/invalid-credential' || code === 'auth/wrong-password' || code === 'auth/user-not-found') {
      errEl.textContent = '❌ Sai email hoặc mật khẩu.';
    } else if (code === 'auth/unauthorized-domain') {
      errEl.innerHTML = '❌ Domain chưa được phép.<br><small>Vào Firebase Console → Authentication → Settings → Authorized domains → thêm domain này.</small>';
    } else if (code === 'auth/network-request-failed') {
      errEl.textContent = '❌ Lỗi mạng. Kiểm tra kết nối internet.';
    } else if (code === 'auth/too-many-requests') {
      errEl.textContent = '❌ Quá nhiều lần thử. Đợi vài phút rồi thử lại.';
    } else if (code === 'auth/user-disabled') {
      errEl.textContent = '❌ Tài khoản đã bị vô hiệu hóa.';
    } else {
      errEl.textContent = '❌ Lỗi: ' + (err.message || code);
    }
    console.error('Auth error:', err.code, err.message);
  }
};
window.doLogout = () => signOut(auth);

onAuthStateChanged(auth, async user => {
  if (!user) { document.getElementById('auth').style.display = 'flex'; return; }
  me = user; isSA = user.email === SUPER_ADMIN_EMAIL;
  document.getElementById('auth').style.display = 'none';
  document.getElementById('sav').textContent = user.email[0].toUpperCase();
  document.getElementById('sue').textContent = user.email;
  document.getElementById('sa-section').style.display  = isSA ? '' : 'none';
  document.getElementById('n-branches').style.display  = isSA ? '' : 'none';
  document.getElementById('n-requests').style.display  = isSA ? '' : 'none';
  document.getElementById('n-import').style.display   = isSA ? '' : 'none';
  await loadBranches(user);
});

async function loadBranches(user) {
  const snap = await getDocs(collection(db,'Branches'));
  allBranches = snap.docs.map(d => ({id:d.id,...d.data()}));
  const sel = document.getElementById('brs');
  sel.innerHTML = '';

  if (isSA) {
    myRole = 'superadmin';
    sel.innerHTML = '<option value="all">🌐 Tất cả (HQ)</option>' +
      allBranches.map(b => `<option value="${b.id}">${b.info?.name||b.id}</option>`).join('');
  } else {
    const myBranches = [];
    for (const b of allBranches) {
      const sd = await getDoc(doc(db,'Branches',b.id,'Staff',user.email));
      if (sd.exists()) myBranches.push({...b, role: sd.data().role});
    }
    if (!myBranches.length) {
      showT('Tài khoản này chưa được phân quyền vào quán nào. Liên hệ Super Admin.','err');
      setTimeout(() => signOut(auth), 3000);
      document.getElementById('pg-c').innerHTML = '<div class="ldr" style="color:var(--red)">Chưa có quyền truy cập.<br><small style="color:var(--txt2)">Tài khoản của bạn chưa được thêm vào Staff của quán nào.<br>Liên hệ Super Admin để được phân quyền.</small></div>';
      return;
    }
    sel.innerHTML = myBranches.map(b => `<option value="${b.id}" data-role="${b.role}">${b.info?.name||b.id}</option>`).join('');
    myRole = myBranches[0].role;
  }
  if (sel.options.length) { sel.selectedIndex = 0; onBrCh(); }
}

window.onBrCh = () => {
  const sel = document.getElementById('brs');
  if (!sel.options.length) return;
  const opt = sel.options[sel.selectedIndex];
  if (!opt) return;
  curBrId   = opt.value;
  curBrName = curBrId === 'all' ? 'Tất cả chi nhánh' : opt.text;
  if (!isSA && opt.dataset.role) myRole = opt.dataset.role;
  document.getElementById('sur').textContent = isSA ? '⭐ Super Admin' : (myRole === 'admin' ? 'Partner Admin' : 'Cashier');
  goP(curPage);
};

const PTITLES = {
  dashboard:'📊 Dashboard', orders:'📋 Đơn hàng',
  menu:'🍽️ Thực đơn & Kho', staff:'👥 Nhân viên',
  vouchers:'🎟️ Voucher', settings:'⚙️ Cài đặt Quán',
  branches:'🏢 Quản lý Đối tác', requests:'📥 Yêu cầu đăng ký', import:'📦 Batch Import — Nhập hàng loạt'
};

window.goP = async p => {
  curPage = p;
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('on'));
  document.getElementById('pg-ttl').textContent = PTITLES[p] || p;
  document.getElementById('pg-acts').innerHTML  = '';
  document.getElementById('pg-c').innerHTML = '<div class="ldr"><div class="spin"></div><span>Đang tải...</span></div>';
  if (!curBrId && !['branches','requests','import'].includes(p)) {
    document.getElementById('pg-c').innerHTML = '<div class="ldr">Chọn chi nhánh</div>'; return;
  }
  try {
    if      (p==='dashboard') await rDash();
    else if (p==='orders')    await rOrders();
    else if (p==='menu')      await rMenu();
    else if (p==='staff')     await rStaff();
    else if (p==='vouchers')  await rVouchers();
    else if (p==='settings')  await rSettings();
    else if (p==='branches')  await rBranches();
    else if (p==='requests')  await rRequests();
    else if (p==='import')    await rBatchImport();
  } catch(e) {
    document.getElementById('pg-c').innerHTML = `<div class="ldr" style="color:var(--red)">Lỗi: ${e.message}</div>`;
  }
};

// ════════════════════════════════════════════════════════
//  DASHBOARD
// ════════════════════════════════════════════════════════
async function rDash() {
  const brIds = curBrId === 'all' ? allBranches.map(b=>b.id) : [curBrId];
  let orders = [], revenue = 0, pendingCount = 0;
  for (const bId of brIds) {
    const snap = await getDocs(query(collection(db,'Branches',bId,'Orders'), orderBy('createdAt','desc'), limit(200)));
    snap.docs.forEach(d => {
      const o = {id:d.id,...d.data()};
      orders.push(o);
      if (['completed','paid','delivered'].includes(o.status)) revenue += o.total||0;
      if (o.status === 'pending') pendingCount++;
    });
  }
  const approvedCount = allBranches.filter(b => b.isPartnerApproved && !b.hidden).length;
  const pendingBranches = allBranches.filter(b => !b.isPartnerApproved).length;

  document.getElementById('pg-c').innerHTML = `
  <div class="kg">
    <div class="kc or"><div class="ki">💰</div><div class="kl">Doanh thu</div><div class="kv" style="color:var(--acc)">${fmt(revenue)}</div><div class="ks">Đơn hoàn thành</div></div>
    <div class="kc gr"><div class="ki">📋</div><div class="kl">Đơn chờ xử lý</div><div class="kv" style="color:var(--grn)">${pendingCount}</div><div class="ks">Đang chờ xác nhận</div></div>
    <div class="kc bl"><div class="ki">🏪</div><div class="kl">Quán đang hoạt động</div><div class="kv" style="color:var(--blu)">${approvedCount}</div><div class="ks">Đã phân quyền</div></div>
    <div class="kc re"><div class="ki">🕐</div><div class="kl">Chờ phân quyền</div><div class="kv" style="color:var(--red)">${pendingBranches}</div><div class="ks" style="cursor:pointer;color:var(--blu);text-decoration:underline" onclick="goP('requests')">Xem ngay →</div></div>
    <div class="kc pu"><div class="ki">🧾</div><div class="kl">Tổng đơn hàng</div><div class="kv" style="color:var(--pur)">${orders.length}</div></div>
  </div>`;
}

// ════════════════════════════════════════════════════════
//  ORDERS — SA: read only / Partner: có thể cập nhật
// ════════════════════════════════════════════════════════
async function rOrders() {
  const SL = {pending:'Chờ XN',paid:'Đã TT',preparing:'Chuẩn bị',delivering:'Giao hàng',delivered:'Đã giao',completed:'Hoàn thành',cancelled:'Đã hủy'};
  const SC = {pending:'var(--ylw)',paid:'var(--grn)',preparing:'var(--blu)',delivering:'var(--pur)',delivered:'#c8a7ff',completed:'#4dffa6',cancelled:'var(--red)'};
  const SF = ['pending','paid','preparing','delivering','delivered','completed','cancelled'];

  let orders = [];
  if (curBrId === 'all') {
    for (const b of allBranches.filter(b=>b.isPartnerApproved)) {
      const snap = await getDocs(query(collection(db,'Branches',b.id,'Orders'), orderBy('createdAt','desc'), limit(50)));
      snap.docs.forEach(d => orders.push({id:d.id, branchName:b.info?.name, branchId:b.id, ...d.data()}));
    }
    orders.sort((a,b) => (b.createdAt?.toMillis()||0) - (a.createdAt?.toMillis()||0));
  } else {
    const snap = await getDocs(query(collection(db,'Branches',curBrId,'Orders'), orderBy('createdAt','desc'), limit(100)));
    orders = snap.docs.map(d => ({id:d.id, branchName:curBrName, branchId:curBrId, ...d.data()}));
  }

  const readOnly = curBrId === 'all'; // SA xem tổng → chỉ đọc

  const rows = orders.map(o => {
    const ts = o.createdAt?.toDate?.(); const s = o.status || 'pending';
    const ch = {dinein:'🪑',takeaway:'🥡',weborder:'🌐',apporder:'📱'}[o.orderType] || '';
    const statusCell = readOnly
      ? `<span class="bdg" style="background:${SC[s]}18;color:${SC[s]}">${SL[s]||s}</span>`
      : `<select style="background:var(--s3);border:1px solid var(--brd);border-radius:6px;padding:4px;color:var(--txt);font-size:11px" onchange="updSt('${o.branchId}','${o.id}',this.value)">${SF.map(st=>`<option value="${st}" ${st===s?'selected':''}>${SL[st]}</option>`).join('')}</select>`;

    const customerCell = o.customer ? `<div style="font-size:11px;color:var(--blu)">${o.customer.name||''} ${o.customer.phone||''}</div>` : '';

    return `<tr>
      <td><span style="font-family:var(--mono);font-size:11px">#${o.id.slice(-6).toUpperCase()}</span></td>
      ${readOnly ? `<td><strong style="color:var(--blu)">${o.branchName||'—'}</strong></td>` : ''}
      <td style="font-size:11px">${ts?ts.toLocaleString('vi-VN'):'—'}<br>${customerCell}</td>
      <td>${ch} ${o.orderType||'—'}</td>
      <td style="font-family:var(--mono);font-weight:700;color:var(--acc)">${fmt(o.total)}</td>
      <td>${statusCell}</td>
    </tr>`;
  }).join('');

  document.getElementById('pg-c').innerHTML = `
  ${readOnly ? `<div style="background:var(--blu-d);border:1px solid var(--blu);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--blu)">
    ℹ️ Chế độ HQ — Chỉ đọc. Super Admin không thể chỉnh sửa đơn hàng của đối tác.
  </div>` : ''}
  <div class="cvd" style="overflow-x:auto">
    <table class="dt"><thead><tr>
      <th>Mã đơn</th>${readOnly ? '<th>Chi nhánh</th>' : ''}
      <th>Thời gian / Khách</th><th>Kênh</th><th>Tổng</th><th>Trạng thái</th>
    </tr></thead>
    <tbody>${rows||'<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--txt3)">Chưa có đơn hàng</td></tr>'}</tbody></table>
  </div>`;
}
window.updSt = async (bId, id, s) => {
  if (curBrId === 'all') { showT('HQ không thể cập nhật đơn hàng','err'); return; }
  await updateDoc(doc(db,'Branches',bId,'Orders',id), {status:s, updatedAt:serverTimestamp()});
  showT('Đã cập nhật','ok');
};

window.saveMenuItem = async id => {
  const data = {
    name: document.getElementById('mi-name').value.trim(),
    price: Number(document.getElementById('mi-price').value),
    category: document.getElementById('mi-cat').value.trim(),
    description: document.getElementById('mi-desc').value.trim(),
    image: _mImgUrl || null, updatedAt: serverTimestamp()
  };

  else { data.available = true; data.stock = -1; data.createdAt = serverTimestamp(); await addDoc(collection(db,'Branches',curBrId,'Menu'), data); showT('Đã thêm món','ok'); }

};
window.delMenuItem = async id => {

window.toggleAvail = async (id, st) => {

window.editStock = async (id, name, cur) => {

window.upMenuImg = async input => {

    document.getElementById('mi-tx').textContent = 'Nhấn để đổi'; showT('Upload thành công','ok');
  } catch(e) { showT('Lỗi: '+e.message,'err'); }

};

    <table class="dt"><thead><tr><th>Mã voucher</th><th>Giảm (%)</th><th>Đã dùng</th><th>Bật/Tắt</th><th>Xóa</th></tr></thead>

window.openAddVoucher = () => openMo('🎟️ Tạo Voucher mới', `
  <div class="fg">
    <div class="ff full"><label>Mã voucher * (viết hoa, không dấu, không khoảng trắng)</label><input id="vc-code" placeholder="GIAM20" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"></div>

    <div class="ff"><label>Số lần dùng tối đa</label><input id="vc-max" type="number" min="0" placeholder="Để trống = không giới hạn"></div>
  </div>
  <p style="font-size:11px;color:var(--txt3);margin-top:4px">VD: mã CHAY50 giảm 50% · dùng tối đa 100 lần</p>
  <div class="fa"><button class="fcn" onclick="closeMo2()">Huỷ</button><button class="fsv" onclick="saveVoucher()">💾 Tạo Voucher</button></div>`);
window.saveVoucher = async () => {
  const code   = document.getElementById('vc-code').value.trim().toUpperCase();
  const pct    = Number(document.getElementById('vc-pct').value);
  const maxRaw = document.getElementById('vc-max').value.trim();
  const maxUse = maxRaw ? Number(maxRaw) : null;
  if (!code || !pct) return showT('Nhập đủ mã và % giảm giá','err');
  if (code.length < 3) return showT('Mã phải có ít nhất 3 ký tự','err');
  const existing = await getDoc(doc(db,'Branches',curBrId,'Vouchers',code));
  if (existing.exists()) return showT('Mã này đã tồn tại!','err');
  await setDoc(doc(db,'Branches',curBrId,'Vouchers',code), {
    percent:pct, active:true, usedCount:0,
    maxUse: maxUse, createdAt:serverTimestamp()
  });
  showT('✅ Đã tạo voucher '+code,'ok'); closeMo2(); rVouchers();
};
window.toggleVoucher = async (id, st) => { await updateDoc(doc(db,'Branches',curBrId,'Vouchers',id), {active:st}); showT(st?'Đã bật voucher':'Đã tắt voucher','ok'); };

window.approveRequest = async (reqId) => {
  if (!confirm('Xác nhận duyệt quán này và cấp quyền quản lý cho họ?')) return;
  const snap = await getDoc(doc(db,'PartnerRequests',reqId));
  if (!snap.exists()) return;
  const r = snap.data();

  // Tìm branch đã được tạo trước đó từ form đăng ký
  const brSnap = await getDocs(query(collection(db,'Branches'), where('requestId','==',reqId)));
  let branchId = null;

  if (!brSnap.empty) {
    // Branch đã tồn tại — chỉ cần phân quyền
    branchId = brSnap.docs[0].id;
    await updateDoc(doc(db,'Branches',branchId), {
      isPartnerApproved: true,
      approvedAt: serverTimestamp(),
      approvedBy: me.email
    });
  } else {
    // Tạo branch mới
    const newRef = await addDoc(collection(db,'Branches'), {
      isPartnerApproved: true,
      hidden: false, isOpen: false, featured: false, displayOrder: 999,
      info: {
        name: r.restaurantName, owner: r.ownerName, email: r.email, phone: r.phone,
        address: r.address||'', street: r.street||'', ward: r.ward||'',
        zalo: r.zalo||'', whatsapp: r.whatsapp||'', facebook: r.facebook||'',
        tiktok: r.tiktok||'', youtube: r.youtube||'', googleMap: r.googleMap||'',
        openTime: r.openTime||'07:00', closeTime: r.closeTime||'21:00',
        description: r.description||'', logo: r.logo||'', vat: DEFAULT_VAT
      },
      requestId: reqId, createdAt: serverTimestamp(), approvedAt: serverTimestamp(), approvedBy: me.email
    });
    branchId = newRef.id;
    // Thêm menu items
    for (const item of (r.menuItems||[])) {
      await addDoc(collection(db,'Branches',branchId,'Menu'), {...item, createdAt:serverTimestamp(), updatedAt:serverTimestamp()});
    }
  }

  // Tạo Staff/Admin cho chủ quán
  await setDoc(doc(db,'Branches',branchId,'Staff',r.email), {
    name: r.ownerName, role: 'admin', addedAt: serverTimestamp()
  });

  // Đánh dấu request đã xử lý
  await updateDoc(doc(db,'PartnerRequests',reqId), {status:'approved', approvedAt:serverTimestamp()});

  showT(`✅ Đã duyệt "${r.restaurantName}"! Tài khoản ${r.email} đã có quyền quản lý.`,'ok');
  closeMo2();
  await loadBranches(me);
  rRequests();
};

window.rejectRequest = async (reqId) => {
  const reason = prompt('Lý do từ chối (tùy chọn):');
  if (reason === null) return;
  await updateDoc(doc(db,'PartnerRequests',reqId), {status:'rejected', rejectReason: reason, rejectedAt: serverTimestamp()});
  // Ẩn branch đã tạo từ form đăng ký
  const brSnap = await getDocs(query(collection(db,'Branches'), where('requestId','==',reqId)));
  if (!brSnap.empty) await updateDoc(doc(db,'Branches',brSnap.docs[0].id), {hidden:true});
  showT('Đã từ chối yêu cầu','inf'); closeMo2(); rRequests();
};

//  BRANCHES — SA: Quản lý toàn bộ quán
// ════════════════════════════════════════════════════════
async function rBranches() {
  if (!isSA) return;
  const snap = await getDocs(collection(db,'Branches'));
  const brs  = snap.docs.map(d => ({id:d.id,...d.data()}));

  brs.sort((a,b) => (a.displayOrder||999) - (b.displayOrder||999));

  const rows = brs.map(b => {
    const info = b.info || {};
    const approved = b.isPartnerApproved && !b.hidden;
    const isOpen   = getIsOpen(b);
    let statusBadge = '';
    if (b.hidden) statusBadge = `<span class="bdg bhid">Ẩn</span>`;
    else if (!b.isPartnerApproved) statusBadge = `<span class="bdg bpnd">Chờ duyệt</span>`;
    else if (isOpen) statusBadge = `<span class="bdg bact">Đang mở</span>`;
    else statusBadge = `<span class="bdg" style="background:var(--red-d);color:var(--red)">Đóng cửa</span>`;

    return `<tr>
      <td>
        ${info.logo ? `<img src="${info.logo}" style="width:36px;height:36px;border-radius:8px;object-fit:cover">` : '<div style="width:36px;height:36px;border-radius:8px;background:var(--s3);display:flex;align-items:center;justify-content:center">🥬</div>'}
      </td>
      <td><strong>${info.name||b.id}</strong><br><span style="font-size:11px;color:var(--txt3)">${info.ward||info.address||'—'}</span></td>
      <td>${statusBadge}</td>
      <td>${b.featured ? '<span style="color:#ffcb47">⭐ Nổi bật</span>' : '—'}</td>
      <td><input type="number" value="${b.displayOrder||999}" style="width:56px;background:var(--s3);border:1px solid var(--brd);border-radius:6px;padding:4px;color:var(--txt);font-size:12px" onchange="setDisplayOrder('${b.id}',this.value)"></td>
      <td>
        <button style="background:var(--s3);border:1px solid var(--brd);border-radius:6px;padding:4px 8px;font-size:11px;margin-right:4px" onclick="openEditBranch('${b.id}')">✏️ Sửa</button>
        <button style="background:${b.hidden?'var(--grn-d)':'var(--ylw-d)'};border:1px solid ${b.hidden?'var(--grn)':'var(--ylw)'};color:${b.hidden?'var(--grn)':'var(--ylw)'};border-radius:6px;padding:4px 8px;font-size:11px" onclick="toggleHideBranch('${b.id}',${b.hidden})">
          ${b.hidden?'👁 Hiện':'🙈 Ẩn'}
        </button>
        ${!b.isPartnerApproved ? `<button style="background:var(--grn-d);border:1px solid var(--grn);color:var(--grn);border-radius:6px;padding:4px 8px;font-size:11px;margin-left:4px" onclick="quickApprove('${b.id}')">✅ Duyệt</button>` : ''}
      </td>
    </tr>`;
  }).join('');

  document.getElementById('pg-acts').innerHTML = '';
  document.getElementById('pg-c').innerHTML = `
  <div class="cvd" style="overflow-x:auto">
    <div style="font-size:12px;color:var(--txt2);margin-bottom:12px">Tổng ${brs.length} nhà hàng · ${brs.filter(b=>b.isPartnerApproved&&!b.hidden).length} đang hoạt động</div>
    <table class="dt"><thead><tr><th>Logo</th><th>Tên Quán / Khu vực</th><th>Trạng thái</th><th>Featured</th><th>Thứ tự</th><th>Thao tác</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--txt3)">Chưa có chi nhánh</td></tr>'}</tbody></table>
  </div>`;
}

function getIsOpen(branch) {
  const info = branch.info || {};
  if (!info.openTime || !info.closeTime) return branch.isOpen !== false;
  const now  = new Date();
  const [oh,om] = info.openTime.split(':').map(Number);
  const [ch,cm] = info.closeTime.split(':').map(Number);
  const cur  = now.getHours()*60+now.getMinutes();
  return cur >= oh*60+om && cur < ch*60+cm;
}

      <span id="batch-parse-info" style="font-size:12px;color:var(--txt2)"></span>
    </div>

    <div id="batch-preview" style="display:none">
      <div style="font-size:12px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Preview trước khi import</div>
      <div id="batch-preview-cards" style="display:flex;flex-direction:column;gap:8px;max-height:360px;overflow-y:auto;margin-bottom:14px"></div>

      <div style="background:var(--ylw-d);border:1px solid var(--ylw);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--ylw);margin-bottom:14px">
        ⚠️ Các quán sẽ được tạo với <code>isPartnerApproved=false</code>. Bạn cần vào <strong>Yêu cầu đăng ký</strong> hoặc <strong>Quản lý Đối tác</strong> để duyệt từng quán sau.
      </div>

      <div id="batch-import-progress" style="display:none;margin-bottom:12px">
        <div style="font-size:12px;color:var(--txt2);margin-bottom:6px" id="batch-prog-text">Đang xử lý...</div>
        <div style="height:6px;background:var(--s3);border-radius:3px;overflow:hidden">
          <div id="batch-prog-bar" style="height:100%;background:var(--grn);width:0;transition:width .3s"></div>
        </div>
      </div>

      <div style="display:flex;gap:10px">
        <button class="bs-acc" id="btn-do-import" onclick="doBatchImport()" style="background:var(--grn);border-color:var(--grn)">✅ Xác nhận Import tất cả</button>
        <button class="hdr-btn" onclick="document.getElementById('batch-preview').style.display='none'">Hủy</button>
      </div>
    </div>
  </div>`;
}

let _batchData = [];

window.parseBatchJSON = () => {
  const raw   = document.getElementById('batch-json-inp').value.trim();
  const info  = document.getElementById('batch-parse-info');
  const prev  = document.getElementById('batch-preview');

  try {
    const clean = raw.replace(/```json?|```/g,'').trim();
    const parsed = JSON.parse(clean);
    _batchData = Array.isArray(parsed) ? parsed : [parsed];
    if (!_batchData.length) throw new Error('Mảng rỗng');

    info.style.color = 'var(--grn)';
    info.textContent = `✅ Hợp lệ: ${_batchData.length} quán, ${_batchData.reduce((s,r)=>(r.menuItems?.length||0)+s,0)} món`;

    // Build preview cards
    document.getElementById('batch-preview-cards').innerHTML = _batchData.map((b, i) => {
      const menuCount = b.menuItems?.length || 0;
      const issues = [];
      if (!b.name) issues.push('thiếu tên');
      if (!b.phone && !b.email) issues.push('thiếu SĐT/email');
      return `<div style="background:var(--s3);border:1px solid var(--brd);border-radius:8px;padding:12px 14px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
          <span style="font-size:22px">${b.logo ? `<img src="${b.logo}" style="width:32px;height:32px;border-radius:6px;object-fit:cover">` : '🏪'}</span>
          <div style="flex:1">
            <div style="font-weight:800;font-size:14px">${b.name || '<em style="color:var(--red)">Chưa có tên</em>'}</div>
            <div style="font-size:11px;color:var(--txt2)">${b.address || b.ward || '—'} · ${b.phone || '—'}</div>
          </div>
          <span style="font-size:11px;background:var(--grn-d);color:var(--grn);padding:2px 8px;border-radius:4px;font-weight:700">${menuCount} món</span>
          ${issues.length ? `<span style="font-size:10px;background:var(--red-d);color:var(--red);padding:2px 6px;border-radius:4px">⚠️ ${issues.join(', ')}</span>` : ''}
        </div>
        ${menuCount > 0 ? `<div style="font-size:11px;color:var(--txt3);line-height:1.7">${b.menuItems.slice(0,5).map(m=>`${m.name} — ${fmt(m.price)}`).join(' · ')}${menuCount>5?` · +${menuCount-5} món khác`:''}</div>` : ''}
      </div>`;
    }).join('');

    prev.style.display = '';
  } catch(e) {
    info.style.color = 'var(--red)';
    info.textContent = '❌ JSON không hợp lệ: ' + e.message;
    prev.style.display = 'none';
  }
};

window.doBatchImport = async () => {
  if (!_batchData.length) return;
  const btn       = document.getElementById('btn-do-import');
  const progWrap  = document.getElementById('batch-import-progress');
  const progText  = document.getElementById('batch-prog-text');
  const progBar   = document.getElementById('batch-prog-bar');
  btn.disabled    = true;
  progWrap.style.display = '';

  let done = 0;
  const results = { success: [], failed: [] };

  for (const b of _batchData) {
    progText.textContent = `Đang tạo: "${b.name || '(chưa tên)'}"... (${done+1}/${_batchData.length})`;
    try {
      const branchRef = await addDoc(collection(db, 'Branches'), {
        isPartnerApproved: false,
        hidden: false, isOpen: false, featured: false, displayOrder: 999,
        info: {
          name:        b.name || '',
          owner:       b.owner || '',
          email:       b.email || '',
          phone:       b.phone || '',
          address:     b.address || '',
          street:      b.street || '',
          ward:        b.ward || '',
          zalo:        b.zalo || '',
          whatsapp:    b.whatsapp || '',
          facebook:    b.facebook || '',
          tiktok:      b.tiktok || '',
          youtube:     b.youtube || '',
          googleMap:   b.googleMap || '',
          openTime:    b.openTime || '07:00',
          closeTime:   b.closeTime || '21:00',
          description: b.description || '',
          logo:        b.logo || '',
          vat:         DEFAULT_VAT
        },
        importedAt: serverTimestamp(),
        createdAt:  serverTimestamp()
      });

      const menuItems = b.menuItems || [];
      for (const item of menuItems) {
        await addDoc(collection(db, 'Branches', branchRef.id, 'Menu'), {
          name:        item.name || '',
          price:       Number(item.price) || 0,
          category:    item.category || 'Món chính',
          description: item.description || '',
          image:       item.image || null,
          available:   true,
          stock:       -1,
          createdAt:   serverTimestamp(),
          updatedAt:   serverTimestamp()
        });
      }

      // Create staff if email provided
      if (b.email) {
        await setDoc(doc(db, 'Branches', branchRef.id, 'Staff', b.email), {
          name: b.owner || '', role: 'admin', addedAt: serverTimestamp()
        });
      }

      results.success.push(b.name || branchRef.id);
    } catch(e) {
      results.failed.push(`${b.name || '?'}: ${e.message}`);
    }
    done++;
    progBar.style.width = (done / _batchData.length * 100) + '%';
  }

  progText.textContent = `Hoàn thành!`;
  await loadBranches(me);

  showT(`✅ Import xong: ${results.success.length} thành công${results.failed.length ? `, ${results.failed.length} lỗi` : ''}`, results.failed.length ? 'inf' : 'ok');

  // Show result summary
  document.getElementById('batch-preview-cards').innerHTML += `
    <div style="background:var(--grn-d);border:1px solid var(--grn);border-radius:8px;padding:14px;margin-top:8px">
      <div style="font-weight:800;color:var(--grn);margin-bottom:8px">✅ Import hoàn tất</div>
      <div style="font-size:12px;color:var(--grn)">Đã tạo ${results.success.length} quán thành công.<br>
      Vào <strong>Quản lý Đối tác</strong> để duyệt và phân quyền.</div>
      ${results.failed.length ? `<div style="margin-top:8px;font-size:11px;color:var(--red)">Lỗi:<br>${results.failed.join('<br>')}</div>` : ''}
    </div>`;
  btn.disabled = false;
};

// ════════════════════════════════════════════════════════
//  IMPROVED IMAGE COMPRESSION (used by all upload flows)
//  Unsharp mask + progressive quality targeting
// ════════════════════════════════════════════════════════
// Override the existing compressImage with enhanced version
async function compressImage(file, maxWidth=800, quality=0.82, outputType='image/webp') {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Không đọc được file ảnh'));
    reader.onload  = ev => {
      const img = new Image();
      img.onerror = () => reject(new Error('File không phải ảnh hợp lệ'));
      img.onload  = () => {
        let { width, height } = img;
        if (width > maxWidth) { height = Math.round(height * maxWidth / width); width = maxWidth; }

        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');

        // White background
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, width, height);

        // Render with slight smoothing
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, 0, 0, width, height);

        // Apply mild sharpening (unsharp mask)
        try {
          const id = ctx.getImageData(0, 0, width, height);
          const sharpened = applyUnsharpMask(id, 0.6);
          ctx.putImageData(sharpened, 0, 0);
        } catch(e) { /* Skip if cross-origin */ }

        canvas.toBlob(blob => {
          if (!blob) reject(new Error('toBlob failed'));
          else resolve(blob);
        }, outputType, quality);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function applyUnsharpMask(imageData, amount=0.6) {
  const { data, width, height } = imageData;
  const blurred = fastBoxBlur(data, width, height);
  const output  = new Uint8ClampedArray(data);
  for (let i = 0; i < data.length; i += 4) {
    for (let c = 0; c < 3; c++) {
      output[i+c] = Math.min(255, Math.max(0, data[i+c] + amount * (data[i+c] - blurred[i+c])));
    }
    output[i+3] = data[i+3];
  }
  return new ImageData(output, width, height);
}

function fastBoxBlur(data, w, h) {
  const out   = new Uint8ClampedArray(data.length);
  const k     = [1,2,1, 2,4,2, 1,2,1];
  const ksum  = 16;
  for (let y=0; y<h; y++) {
    for (let x=0; x<w; x++) {
      let r=0, g=0, b=0, ki=0;
      for (let dy=-1; dy<=1; dy++) for (let dx=-1; dx<=1; dx++) {
        const nx = Math.min(w-1, Math.max(0, x+dx));
        const ny = Math.min(h-1, Math.max(0, y+dy));
        const idx = (ny*w+nx)*4;
        r += data[idx]*k[ki]; g += data[idx+1]*k[ki]; b += data[idx+2]*k[ki]; ki++;
      }
      const oi = (y*w+x)*4;
      out[oi]=r/ksum; out[oi+1]=g/ksum; out[oi+2]=b/ksum; out[oi+3]=data[oi+3];
    }
  }
  return out;
}
