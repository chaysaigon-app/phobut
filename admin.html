<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Trị Phở Bụt - Miễn Phí</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .admin-container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2e7d32; text-align: center; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-add { background: #2e7d32; color: white; margin-top: 10px; }
        .btn-add:hover { background: #1b5e20; }
        .loading { display: none; text-align: center; color: #e67e22; font-weight: bold; margin: 10px 0; }
        hr { border: 0; border-top: 1px solid #eee; margin: 25px 0; }
        .item-list { margin-top: 20px; }
        .menu-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #fafafa; background: #fff; margin-bottom: 5px; border-radius: 5px; }
        .menu-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; margin-right: 10px; }
        .btn-del { background: #ffeded; color: #d32f2f; width: auto; padding: 5px 15px; font-size: 13px; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>🌿 Quản Lý Món Ăn</h2>
    
    <div class="form-group">
        <label>Tên món (Việt):</label>
        <input type="text" id="tenVi" placeholder="Ví dụ: Phở Bụt Đặc Biệt">
    </div>
    <div class="form-group">
        <label>Tên món (Anh):</label>
        <input type="text" id="tenEn" placeholder="Ví dụ: Special Buddha Pho">
    </div>
    <div class="form-group">
        <label>Giá tiền (VND):</label>
        <input type="number" id="gia" placeholder="Ví dụ: 55000">
    </div>
    <div class="form-group">
        <label>Chọn ảnh từ máy tính:</label>
        <input type="file" id="fileAnh" accept="image/*">
    </div>

    <div id="loading-text" class="loading">⏳ Đang tải ảnh lên Imgur, con đợi xíu nghen...</div>
    <button class="btn-add" onclick="window.xuLyThemMon()">➕ Thêm Vào Thực Đơn</button>

    <hr>
    <h3>📋 Danh sách món hiện có</h3>
    <div id="list-mon-admin" class="item-list">Đang tải dữ liệu...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyA0zujbTZbHe_7gAe_y9QkrcR4qXKC6Abo", 
        authDomain: "phobut-95574.firebaseapp.com", 
        projectId: "phobut-95574"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- HÀM TẢI ẢNH LÊN IMGUR (MIỄN PHÍ) ---
    async function uploadToImgur(file) {
        const clientId = "546c36345969068"; // Client ID công cộng hoặc của riêng con
        const formData = new FormData();
        formData.append("image", file);

        const response = await fetch("https://api.imgur.com/3/image", {
            method: "POST",
            headers: { Authorization: `Client-ID ${clientId}` },
            body: formData
        });

        const data = await response.json();
        if (data.success) return data.data.link; // Trả về link ảnh trực tiếp
        else throw new Error("Lỗi tải ảnh rồi con ơi!");
    }

    // --- HÀM XỬ LÝ THÊM MÓN ---
    window.xuLyThemMon = async () => {
        const tenVi = document.getElementById('tenVi').value;
        const tenEn = document.getElementById('tenEn').value;
        const gia = document.getElementById('gia').value;
        const file = document.getElementById('fileAnh').files[0];
        const loading = document.getElementById('loading-text');

        if(!file || !tenVi || !gia) { alert("Con bận điền đủ tên, giá với chọn cái hình nghen!"); return; }

        try {
            loading.style.display = "block";
            
            // 1. Đẩy ảnh lên Imgur lấy link
            const urlHinh = await uploadToImgur(file);

            // 2. Lưu vào Firestore (Chỉ tốn dung lượng chữ - Miễn phí)
            await addDoc(collection(db, "Menus"), {
                ten_tieng_viet: tenVi,
                ten_tieng_anh: tenEn,
                gia_tien: Number(gia),
                hinh_anh: urlHinh
            });

            alert("Đã thêm món mới thành công rồi nghen!");
            location.reload();
        } catch (e) { 
            alert("Có lỗi xảy ra: " + e.message);
        } finally {
            loading.style.display = "none";
        }
    };

    // --- HÀM HIỂN THỊ DANH SÁCH ---
    async function loadData() {
        const snap = await getDocs(collection(db, "Menus"));
        const listDiv = document.getElementById('list-mon-admin');
        listDiv.innerHTML = "";
        snap.forEach((d) => {
            const m = d.data();
            listDiv.innerHTML += `
                <div class="menu-item">
                    <div style="display:flex; align-items:center;">
                        <img src="${m.hinh_anh}">
                        <div><b>${m.ten_tieng_viet}</b><br><small>${m.gia_tien.toLocaleString()}đ</small></div>
                    </div>
                    <button class="btn-del" onclick="window.xoaMon('${d.id}')">Xóa</button>
                </div>`;
        });
    }

    window.xoaMon = async (id) => {
        if(confirm("Con có chắc muốn xóa món này không?")) {
            await deleteDoc(doc(db, "Menus", id));
            location.reload();
        }
    };

    loadData();
</script>
</body>
</html>
