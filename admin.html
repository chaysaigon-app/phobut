<h3>✨ Nhận Diện & Màu Sắc</h3>
<div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
    <div class="form-group"><label>Tên Thương Hiệu:</label><input type="text" id="brandName"></div>
    <div class="form-group"><label>Thuế VAT (%):</label><input type="number" id="vatRate"></div>
    <div class="form-group">
        <label>Tông màu chủ đạo:</label>
        <select id="mainColor" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
            <option value="#2e7d32">Xanh Lá (Chay)</option>
            <option value="#c62828">Đỏ Đô (Bún/Lẩu)</option>
            <option value="#f9a825">Vàng Nghệ (Cổ điển)</option>
            <option value="#6d4c41">Nâu Đất (Cà phê)</option>
            <option value="#1565c0">Xanh Dương (Hải sản)</option>
            <option value="#d84315">Cam Đất (Món nướng)</option>
        </select>
    </div>
</div>

<script type="module">
    // ... (Giữ nguyên các hàm khác)
    async function loadThongTin() {
        const snap = await getDoc(doc(db, "Settings", "info"));
        if (snap.exists()) {
            const d = snap.data();
            document.getElementById('brandName').value = d.brand_name || "";
            document.getElementById('mainColor').value = d.main_color || "#2e7d32"; // Tải màu đã lưu
            // ... (Tải các thông tin khác y như cũ)
        }
    }

    window.luuThongTin = async () => {
        // ... (Xử lý upload ảnh y như cũ)
        await setDoc(doc(db, "Settings", "info"), {
            brand_name: document.getElementById('brandName').value,
            main_color: document.getElementById('mainColor').value, // Lưu màu được chọn
            // ... (Lưu các thông tin khác y như cũ)
        }, { merge: true });
        alert("Đã lưu cấu hình và màu sắc mới!");
    };
</script>
