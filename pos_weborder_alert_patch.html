<!-- ═══════════════════════════════════════════════════════════

<style id="weborder-alert-css">

/* ── WebOrder Alert Overlay ─────────────────────────────── */
#wo-alert-overlay {
  position: fixed;
  inset: 0;
  z-index: 9900;
  background: rgba(0, 0, 0, .75);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: woPulse 1.5s ease-in-out infinite;
}
#wo-alert-overlay.show {
  display: flex;
}

@keyframes woPulse {
  0%, 100% { background: rgba(0, 0, 0, .75); }
  50%       { background: rgba(79, 156, 255, .25); }
}

.wo-alert-box {
  width: 100%;
  max-width: 380px;
  background: var(--s1);
  border: 2px solid var(--blu);
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 0 60px rgba(79, 156, 255, .4), 0 20px 60px rgba(0,0,0,.5);
  animation: woSlide .35s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes woSlide {
  from { transform: scale(.8) translateY(40px); opacity: 0; }
  to   { transform: scale(1)  translateY(0);    opacity: 1; }
}

.wo-alert-header {
  background: linear-gradient(135deg, #1a3a6e 0%, #0d2240 100%);
  padding: 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.wo-alert-header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 50%, rgba(79,156,255,.3) 0%, transparent 70%);
  animation: woGlow 2s ease-in-out infinite;
}
@keyframes woGlow {
  0%, 100% { opacity: .5; }
  50%       { opacity: 1; }
}

.wo-alert-icon {
  font-size: 48px;
  display: block;
  margin-bottom: 8px;
  position: relative;
  animation: woBounce 0.6s ease infinite alternate;
}
@keyframes woBounce {
  from { transform: translateY(0);   }
  to   { transform: translateY(-8px); }
}

.wo-alert-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--blu-d);
  border: 1.5px solid var(--blu);
  color: var(--blu);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  position: relative;
}
.wo-badge-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--blu);
  animation: woDot 1s ease infinite;
}
@keyframes woDot {
  0%, 100% { opacity: 1; transform: scale(1);    }
  50%       { opacity: .4; transform: scale(.7); }
}

.wo-alert-title {
  font-size: 20px;
  font-weight: 900;
  color: var(--txt);
  margin-top: 14px;
  position: relative;
}
.wo-alert-subtitle {
  font-size: 12px;
  color: var(--txt2);
  margin-top: 4px;
  position: relative;
}

/* Order details inside alert */
.wo-alert-body {
  padding: 16px 20px;
}

.wo-detail-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--brd2);
}
.wo-detail-row:last-of-type {
  border-bottom: none;
}
.wo-detail-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.wo-detail-lbl  { font-size: 11px; color: var(--txt3); font-weight: 700;
  text-transform: uppercase; letter-spacing: .5px; }
.wo-detail-val  { font-size: 14px; color: var(--txt); font-weight: 600; line-height: 1.4; }
.wo-detail-total { font-family: var(--mono); font-size: 18px;
  font-weight: 900; color: var(--grn); }

.wo-alert-actions {
  padding: 0 20px 20px;
  display: flex;
  gap: 10px;
}
.wo-btn-dismiss {
  flex: 1;
  padding: 13px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 700;
  background: var(--s3);
  color: var(--txt2);
  border: 1.5px solid var(--brd);
}
.wo-btn-confirm {
  flex: 2;
  padding: 13px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 800;
  background: var(--blu);
  color: #fff;
  box-shadow: 0 4px 16px rgba(79,156,255,.4);
}
.wo-btn-confirm:active { background: #3d8aff; }

/* Pending queue badge trên nav */
#weborder-queue-badge {
  position: absolute;
  top: 4px;
  right: calc(50% - 24px);
  background: var(--blu);
  color: #fff;
  min-width: 18px;
  height: 18px;
  border-radius: 9px;
  font-size: 9px;
  font-weight: 900;
  padding: 0 4px;
  display: none;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--bg);
}
</style>

     HTML — Dán vào trước </body> trong pos.html

  <div class="wo-alert-box">

<!-- ═══════════════════════════════════════════════════════════
     JAVASCRIPT — Thêm vào cuối <script type="module"> trong pos.html
     (Và thay thế hàm subscribeOrders() cũ)
     ═══════════════════════════════════════════════════════════ -->
<script type="module" id="weborder-alert-script">
// ════════════════════════════════════════════════════════════
//  WEBORDER ALERT SYSTEM
//  - Theo dõi realtime sub-collection Orders của branch
//  - Khi có đơn mới từ weborder & status == "pending":
//    → Hiện popup lớn + phát âm thanh
//    → Thu ngân bấm xác nhận → tự update status → "preparing"
// ════════════════════════════════════════════════════════════

// Tập hợp ID các đơn đã được alert (tránh alert lại sau reload)
const _alertedOrderIds = new Set(
  JSON.parse(sessionStorage.getItem("_pos_alerted_ids") || "[]")
);

// Hàng đợi các đơn web đang chờ alert (trường hợp nhiều đơn cùng lúc)
const _webOrderQueue = [];
let   _alertActive   = false;
let   _currentAlertOrder = null;

// ── Audio Alert ──────────────────────────────────────────────
// Tạo âm thanh bằng Web Audio API (không cần file audio ngoài)
function playWebOrderSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    // Chuỗi 3 beep tăng dần pitch
    const beeps = [
      { freq: 880,  time: 0,    dur: 0.12 },
      { freq: 1100, time: 0.16, dur: 0.12 },
      { freq: 1320, time: 0.32, dur: 0.25 },
      { freq: 1100, time: 0.62, dur: 0.12 },
      { freq: 1320, time: 0.78, dur: 0.35 },
    ];

    beeps.forEach(({ freq, time, dur }) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.type      = "sine";
      osc.frequency.setValueAtTime(freq, ctx.currentTime + time);
      gain.gain.setValueAtTime(0, ctx.currentTime + time);
      gain.gain.linearRampToValueAtTime(0.6, ctx.currentTime + time + 0.02);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + time + dur);

      osc.start(ctx.currentTime + time);
      osc.stop(ctx.currentTime + time + dur + 0.05);
    });
  } catch (e) {
    console.warn("Audio API not available:", e);
  }
}

// ── Render nội dung popup ────────────────────────────────────
function renderWebOrderAlertBody(order) {
  const c      = order.customer || {};
  const items  = (order.items || []).map(i => `${i.name} ×${i.qty}`).join("\n");
  const dtLabel = { dinein:"🪑 Tại chỗ", takeaway:"🥡 Mang về", delivery:"🛵 Giao tận nhà" };
  const delType = dtLabel[order.deliveryType] || "🌐 Web";

  document.getElementById("wo-alert-body").innerHTML = `
    <div class="wo-detail-row">
      <span class="wo-detail-icon">👤</span>
      <div>
        <div class="wo-detail-lbl">Khách hàng</div>
        <div class="wo-detail-val">
          <strong>${c.name || "—"}</strong><br/>
          📞 <a href="tel:${c.phone || ""}" style="color:var(--blu);text-decoration:none;font-weight:700">
            ${c.phone || "—"}
          </a>
        </div>
      </div>
    </div>

    ${c.address ? `
    <div class="wo-detail-row">
      <span class="wo-detail-icon">📍</span>
      <div>
        <div class="wo-detail-lbl">Địa chỉ giao hàng</div>
        <div class="wo-detail-val">${c.address}</div>
      </div>
    </div>` : ""}

    <div class="wo-detail-row">
      <span class="wo-detail-icon">🛍</span>
      <div>
        <div class="wo-detail-lbl">Món đặt — ${delType}</div>
        <div class="wo-detail-val" style="white-space:pre-line">${items || "—"}</div>
      </div>
    </div>

    ${order.note ? `
    <div class="wo-detail-row">
      <span class="wo-detail-icon">📝</span>
      <div>
        <div class="wo-detail-lbl">Ghi chú</div>
        <div class="wo-detail-val" style="color:var(--ylw)">${order.note}</div>
      </div>
    </div>` : ""}

    <div class="wo-detail-row" style="border-bottom:none">
      <span class="wo-detail-icon">💰</span>
      <div>
        <div class="wo-detail-lbl">Tổng tiền</div>
        <div class="wo-detail-total">${fmt(order.total || 0)}</div>
      </div>
    </div>
  `;
}

// ── Hiện popup cho một đơn ───────────────────────────────────
function showWebOrderAlert(order) {
  _currentAlertOrder = order;
  _alertActive       = true;
  renderWebOrderAlertBody(order);

  const overlay = document.getElementById("wo-alert-overlay");
  overlay.classList.add("show");

  // Phát âm thanh
  playWebOrderSound();

  // Rung thiết bị (nếu hỗ trợ)
  if (navigator.vibrate) {
    navigator.vibrate([200, 100, 200, 100, 400]);
  }

  // Tự lặp âm thanh mỗi 8 giây cho đến khi thu ngân xử lý
  clearInterval(window._woSoundInterval);
  window._woSoundInterval = setInterval(() => {
    if (_alertActive) playWebOrderSound();
    else clearInterval(window._woSoundInterval);
  }, 8000);

  // Đánh dấu đã alert
  _alertedOrderIds.add(order.id);
  sessionStorage.setItem(
    "_pos_alerted_ids",
    JSON.stringify([..._alertedOrderIds])
  );
}

// ── Thu ngân bấm "Để sau" ────────────────────────────────────
window.webOrderAlertDismiss = () => {
  _alertActive = false;
  clearInterval(window._woSoundInterval);
  document.getElementById("wo-alert-overlay").classList.remove("show");
  _currentAlertOrder = null;

  // Nếu còn đơn trong queue, hiện tiếp sau 1.5s
  if (_webOrderQueue.length > 0) {
    setTimeout(() => {
      const next = _webOrderQueue.shift();
      if (next) showWebOrderAlert(next);
    }, 1500);
  }
};

// ── Thu ngân bấm "Đã liên hệ → Chuẩn bị" ───────────────────
window.webOrderAlertConfirm = async () => {
  if (!_currentAlertOrder) return;
  const orderId = _currentAlertOrder.id;

  try {
    // Cập nhật status → "preparing" (thu ngân đã liên hệ)
    await updateDoc(doc(db, "Branches", brId, "Orders", orderId), {
      status:    "preparing",
      updatedAt: serverTimestamp()
    });
    toast("✅ Đã xác nhận! Đơn chuyển sang 'Đang chuẩn bị'", "ok");
  } catch (e) {
    toast("Lỗi cập nhật: " + e.message, "err");
    console.error("webOrderAlertConfirm:", e);
  }

  webOrderAlertDismiss();
};

// ════════════════════════════════════════════════════════════
//  subscribeOrders() — THAY THẾ hàm cũ trong pos.html
//  Bổ sung: phát hiện weborder mới, trigger alert
// ════════════════════════════════════════════════════════════
function subscribeOrders() {
  if (liveUnsub) liveUnsub();

  let isFirstSnapshot = true; // Bỏ qua alert khi load lần đầu

  const q = query(
    collection(db, "Branches", brId, "Orders"),
    orderBy("createdAt", "desc"),
    limit(60)
  );

  liveUnsub = onSnapshot(q, snap => {
    const allOrders  = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const liveOrders = allOrders.filter(o =>
      o.status !== "completed" && o.status !== "cancelled"
    );

    // Render danh sách đơn đang hoạt động (giữ nguyên)
    renderLiveOrders(liveOrders);

    // Cập nhật badge nav
    const n = liveOrders.length;
    const b = document.getElementById("bn-orders-badge");
    b.style.display = n ? "flex" : "none";
    b.textContent   = n;
    document.getElementById("orders-cnt").textContent = n ? `${n} đang hoạt động` : "";

    // ── Phát hiện WebOrder mới ──────────────────────────────
    if (!isFirstSnapshot) {
      snap.docChanges().forEach(change => {
        if (change.type === "added") {
          const order = { id: change.doc.id, ...change.doc.data() };

          // Chỉ alert nếu:
          // - Là weborder
          // - Status là "pending" (chưa được xử lý)
          // - Chưa từng alert đơn này
          if (
            order.orderType === "weborder" &&
            order.status    === "pending" &&
            !_alertedOrderIds.has(order.id)
          ) {
            if (_alertActive) {
              // Đang hiện alert khác → thêm vào queue
              _webOrderQueue.push(order);
              updateWebOrderQueueBadge();
            } else {
              showWebOrderAlert(order);
            }
          }
        }
      });
    }

    isFirstSnapshot = false;
  }, err => console.error("subscribeOrders:", err));
}

// ── Badge hiển thị số đơn web đang xếp hàng ─────────────────
function updateWebOrderQueueBadge() {
  // Tìm nút Orders trên bottom nav để gắn badge phụ
  const ordersNav = document.querySelector(".bni[data-pg='orders']");
  if (!ordersNav) return;

  let badge = document.getElementById("weborder-queue-badge");
  if (!badge) {
    badge = document.createElement("span");
    badge.id = "weborder-queue-badge";
    badge.className = "bni-badge";
    badge.style.cssText = "display:none;background:var(--blu);right:calc(50% - 28px)";
    ordersNav.appendChild(badge);
  }

  const count = _webOrderQueue.length;
  badge.style.display = count > 0 ? "flex" : "none";
  badge.textContent   = count;
}
</script>
