<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa Hàng Trực Tuyến</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript"> (function(){ emailjs.init("67fQLu2LTz1bZmT5L"); })(); </script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 100px; color: #333; line-height: 1.6; top: 0px !important; }
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        .auth-bar { background: #1b5e20; color: white; padding: 10px; text-align: right; font-size: 0.85em; }
        .auth-link { color: white; text-decoration: underline; cursor: pointer; margin-left: 10px; font-weight: bold; }
        .header { background: #2e7d32; color: white; padding: 35px 20px 25px; text-align: center; position: relative; }
        .header h1 { margin: 0; font-size: 2.2em; letter-spacing: 1px; }
        .lang-switch { position: absolute; top: 15px; right: 15px; z-index: 100; }
        .container { max-width: 1000px; margin: auto; padding: 15px; }
        .section-title { color: #2e7d32; border-left: 4px solid #e67e22; padding-left: 10px; margin: 30px 0 20px; font-size: 1.5em; font-weight: bold; }
        .dynamic-section { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; display: grid; grid-template-columns: 1fr; gap: 20px; padding: 25px; margin-bottom: 20px; }
        @media (min-width: 768px) { .dynamic-section { grid-template-columns: 1fr 1fr; gap: 40px; } }
        .about-media img { width: 100%; border-radius: 12px; object-fit: cover; aspect-ratio: 1/1; }
        .message-box { background: #f0fdf4; border: 2px solid #4caf50; border-radius: 12px; padding: 15px 20px; margin-bottom: 20px; font-style: italic; color: #2e7d32; position: relative; }
        .core-about-card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: justify; }
        .menu-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .menu-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.08); text-align: center; }
        .menu-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .btn-add { background: #2e7d32; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 90%; margin-bottom: 15px; font-weight: bold;}
        .cart-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px; display: flex; justify-content: space-between; z-index: 1000; border-top: 2px solid #2e7d32; box-sizing: border-box;}
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 85%; max-width: 450px; border-radius: 15px; max-height: 85vh; overflow-y: auto; }
        .modal-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #2e7d32; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; }
        .history-card { background: #f9f9f9; border: 1px solid #eee; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="auth-bar" id="auth-status">Đang tải...</div>

<div class="header">
    <div id="google_translate_element" class="lang-switch"></div>
    <h1 id="brand-h1">🌱 Loading...</h1>
    <p>Ẩm Thực Tinh Khiết & Tỉnh Thức</p>
</div>

<div class="container">
    <div class="section-title">🌿 Về Chúng Tôi</div>
    <div class="dynamic-section">
        <div class="about-media"><img id="about-img" src=""></div>
        <div class="about-content">
            <div class="message-box" id="dynamic-message" style="display: none;"></div>
            <div id="social-links" style="margin-bottom:15px; display:flex; gap:10px;"></div>
            <div style="background:#f9fbf9; padding:15px; border-radius:10px; border:1px dashed #2e7d32;">
                <p>📍 <b>Địa chỉ:</b> <span id="display-address">...</span></p>
                <p>📞 <b>Hotline:</b> <span id="display-phone">...</span></p>
                <a href="#" id="btn-map" target="_blank" style="display:none; color:#e67e22; font-weight:bold; text-decoration:none;">🗺️ Chỉ đường</a>
            </div>
        </div>
    </div>

    <div class="core-about-card" id="core-about-card"></div>
    <div id="youtube-container" style="display: none;"></div>

    <div class="section-title">🍜 Thực Đơn</div>
    <div id="menu-list" class="menu-list"></div>

    <div style="text-align:center; padding: 40px 20px 20px; color:#ccc; font-size:0.8em;">
        © 2026 <span id="footer-brand">...</span> | <a href="orders.html" style="color:#ccc;">Đơn Hàng</a> | <a href="admin.html" style="color:#ccc;">Quản Trị</a>
    </div>
</div>

<div class="cart-bar">
    <div>🛒 <b><span id="cart-count">0</span> món</b> <br><span id="cart-total" style="color:#d35400; font-weight:bold;">0đ</span></div>
    <button onclick="window.moGioHang()" style="background:#e67e22; color:white; border:none; padding:10px 20px; border-radius:25px; font-weight:bold; cursor:pointer;">Xem Giỏ Hàng</button>
</div>

<div id="auth-modal" class="modal"><div class="modal-content" id="auth-form-container"></div></div>
<div id="profile-modal" class="modal"><div class="modal-content" id="profile-container"></div></div>
<div id="cart-modal" class="modal"><div class="modal-content" id="cart-container"></div></div>
<div id="checkout-modal" class="modal"><div class="modal-content" id="checkout-container"></div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, serverTimestamp, getDoc, doc, setDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyA0zujbTZbHe_7gAe_y9QkrcR4qXKC6Abo", authDomain: "phobut-95574.firebaseapp.com", projectId: "phobut-95574" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const defaultIntro = `Chào mừng bạn đến với <b>Veggie Saigon</b> – nơi tinh hoa ẩm thực Việt hội tụ cùng phong cách Fusion quốc tế trong một trải nghiệm <b>Thuần chay Tinh khiết (Pure Vegan)</b> hoàn hảo. <br><br><b>1. Tiêu chuẩn khắt khe cho Thân & Tâm:</b><br>Chúng tôi thấu hiểu và tôn trọng tuyệt đối chế độ ăn chánh niệm của bạn. Bếp nhà Veggie Saigon cam kết:<ul><li><b>100% Thuần chay:</b> Không trứng, không thành phần động vật.</li><li><b>Không Ngũ Vị Tân:</b> Hoàn toàn không hành, hẹ, tỏi, kiệu, hưng cừ.</li><li><b>Đồ uống Thuần chay:</b> Chỉ sử dụng các loại sữa hạt tự nhiên, nói không với sữa động vật và mật ong.</li></ul><b>2. Nguyên liệu tươi ngon & Sự chọn lọc tinh túy:</b><br>Chúng tôi sử dụng rau củ quả tươi mới mỗi ngày, được tuyển chọn kỹ lưỡng. Mỗi món ăn là một sự kết hợp khéo léo giữa nét truyền thống Việt Nam và tư duy ẩm thực quốc tế hóa.<br><br><b>3. Thực đơn đa dạng – Phù hợp mọi khoảnh khắc:</b><br>Dù bạn đi một mình hay dùng bữa cùng gia đình, Veggie Saigon luôn có lựa chọn hoàn hảo:<ul><li>Đầy đủ các món quốc hồn quốc túy: Bánh mì, Phở, Bún, Mì.</li><li>Đa dạng cách chế biến: Món chiên giòn tan, món xào đậm đà, món soup thanh tao.</li><li>Phục vụ từ các món khai vị nhẹ nhàng đến mâm cơm gia đình ấm cúng.</li></ul><b>4. Ăn uống Tỉnh thức & Kết nối:</b><br>Hơn cả một bữa ăn, chúng tôi mong muốn mang đến một không gian của sự Tỉnh thức. Mỗi thực khách khi đến với Veggie Saigon không chỉ để thưởng thức món ăn ngon, mà còn để nuôi dưỡng sự bình an trong tâm hồn và kết nối yêu thương với vạn vật.`;

    let currentUser = null, userProfile = {}, cart = {}, thongTinQuan = {};

    async function init() {
        const snap = await getDoc(doc(db, "Settings", "info"));
        if (snap.exists()) {
            thongTinQuan = snap.data();
            const b = thongTinQuan.brand_name || "Cửa Hàng";
            document.title = b; document.getElementById('brand-h1').innerText = "🌱 " + b;
            document.getElementById('footer-brand').innerText = b;
            document.getElementById('display-address').innerText = thongTinQuan.store_address || "";
            document.getElementById('display-phone').innerText = thongTinQuan.store_phone || "";
            document.getElementById('core-about-card').innerHTML = thongTinQuan.bai_gioi_thieu_chinh || defaultIntro;
            if(thongTinQuan.hinh_dai_dien) document.getElementById('about-img').src = thongTinQuan.hinh_dai_dien;
            if(thongTinQuan.link_map) { document.getElementById('btn-map').href = thongTinQuan.link_map; document.getElementById('btn-map').style.display='inline-block'; }
            if(thongTinQuan.loi_gioi_thieu) { document.getElementById('dynamic-message').innerHTML = thongTinQuan.loi_gioi_thieu.replace(/\n/g, '<br>'); document.getElementById('dynamic-message').style.display='block'; }
        } else { document.getElementById('core-about-card').innerHTML = defaultIntro; }
        fetchMenu();
    }

    async function fetchMenu() {
        const snap = await getDocs(collection(db, "Menus"));
        const list = document.getElementById('menu-list'); list.innerHTML = "";
        snap.forEach(d => {
            const m = d.data(); const out = (m.ton_kho <= 0);
            list.innerHTML += `<div class="menu-card" style="opacity:${out?0.6:1}"><img src="${m.hinh_anh}"><div style="padding:10px;"><h3>${m.ten_tieng_viet}</h3><p style="font-weight:bold; color:#d35400;">${m.gia_tien.toLocaleString()}đ</p><button class="btn-add" ${out?'disabled style="background:#ccc"':''} onclick="window.addToCart('${m.ten_tieng_viet}', ${m.gia_tien})">${out?'Hết món':'Thêm vào giỏ'}</button></div></div>`;
        });
    }

    onAuthStateChanged(auth, async (user) => {
        const bar = document.getElementById('auth-status');
        if (user) {
            currentUser = user; bar.innerHTML = `Chào, <b>${user.email.split('@')[0]}</b> | <span onclick="window.moTaiKhoan()" style="cursor:pointer;text-decoration:underline;">Tài khoản</span> | <span onclick="window.logout()" style="cursor:pointer;">Thoát</span>`;
            const uSnap = await getDoc(doc(db, "Users", user.email)); if(uSnap.exists()) userProfile = uSnap.data();
        } else { currentUser = null; bar.innerHTML = `<span onclick="window.moLogin()" style="cursor:pointer; border:1px solid white; padding:2px 8px; border-radius:5px;">Đăng nhập</span>`; }
    });

    window.addToCart = (n, p) => { if(cart[n]) cart[n].sl++; else cart[n] = { gia: p, sl: 1 }; updateUI(); Swal.fire({toast:true, position:'top-end', icon:'success', title:'Đã thêm', showConfirmButton:false, timer:1000}); };
    function updateUI() { let c = 0, t = 0; for(let k in cart) { c += cart[k].sl; t += (cart[k].sl * cart[k].gia); } document.getElementById('cart-count').innerText = c; document.getElementById('cart-total').innerText = t.toLocaleString() + 'đ'; }

    window.moGioHang = () => {
        if(Object.keys(cart).length === 0) return Swal.fire("Trống!");
        let h = '<h2>Giỏ Hàng</h2>', t = 0;
        for(let k in cart) { t += cart[k].sl * cart[k].gia; h += `<div class="cart-item"><span>${k}</span><div><button onclick="window.qty('${k}',-1)">-</button> ${cart[k].sl} <button onclick="window.qty('${k}',1)">+</button></div></div>`; }
        h += `<h3 style="text-align:right;">Tổng: ${t.toLocaleString()}đ</h3><button class="btn-login" style="background:#e67e22" onclick="window.checkOut()">Tiến Hành Đặt Hàng</button>`;
        document.getElementById('cart-container').innerHTML = h; document.getElementById('cart-modal').style.display='block';
    };

    window.qty = (k, v) => { cart[k].sl += v; if(cart[k].sl<=0) delete cart[k]; window.moGioHang(); updateUI(); };
    window.checkOut = () => { if(!currentUser) return window.moLogin(); document.getElementById('cart-modal').style.display='none'; document.getElementById('checkout-container').innerHTML = `<h2>Giao Hàng</h2><input id="sPh" class="modal-input" placeholder="SĐT (*)" value="${userProfile.phone||''}"><textarea id="sAd" class="modal-input" rows="2" placeholder="Địa chỉ (*)">${userProfile.address||''}</textarea><textarea id="sNt" class="modal-input" rows="2" placeholder="Ghi chú..."></textarea><button id="btn-submit-order" class="btn-login" style="background:#e67e22" onclick="window.confirmOrder()">Xác Nhận Đặt Đơn</button>`; document.getElementById('checkout-modal').style.display='block'; };

    window.confirmOrder = async () => {
        const ph = document.getElementById('sPh').value, ad = document.getElementById('sAd').value, nt = document.getElementById('sNt').value;
        if(!ph || !ad) return alert("Thiếu thông tin!");
        const btn = document.getElementById('btn-submit-order'); btn.disabled = true; btn.innerText = "Đang kiểm tra kho...";
        try {
            const snapMenu = await getDocs(collection(db, "Menus")); const menuData = {};
            snapMenu.forEach(d => { menuData[d.data().ten_tieng_viet] = { ton: d.data().ton_kho||0, von: d.data().gia_von||0 }; });
            let err = ""; let total = 0, totalV = 0;
            for(let k in cart) { 
                if(cart[k].sl > menuData[k].ton) err += `- ${k} (còn ${menuData[k].ton})\n`;
                total += cart[k].sl * cart[k].gia; totalV += cart[k].sl * menuData[k].von;
            }
            if(err) { btn.disabled = false; btn.innerText = "Xác Nhận Đặt Đơn"; return Swal.fire("Hết món", err, "error"); }
            await addDoc(collection(db, "Orders"), { khach_hang: currentUser.email, dien_thoai: ph, dia_chi: ad, ghi_chu: nt, chi_tiet: cart, tong_tien: total, tong_von: totalV, thoi_gian: serverTimestamp(), trang_thai: "Chờ xác nhận" });
            await setDoc(doc(db, "Users", currentUser.email), { phone: ph, address: ad }, { merge: true });
            Swal.fire("Thành công!", "Đơn đã gửi.", "success"); cart = {}; updateUI(); document.getElementById('checkout-modal').style.display='none';
        } catch (e) { alert(e.message); btn.disabled = false; }
    };

    window.moLogin = () => { document.getElementById('auth-form-container').innerHTML = `<h2>Đăng Nhập</h2><input id="lE" class="modal-input" placeholder="Email"><input id="lP" type="password" class="modal-input" placeholder="Mật khẩu"><button class="btn-login" onclick="window.doLogin()">Vào Cửa Hàng</button>`; document.getElementById('auth-modal').style.display='block'; };
    window.doLogin = async () => { try { await signInWithEmailAndPassword(auth, document.getElementById('lE').value, document.getElementById('lP').value); document.getElementById('auth-modal').style.display='none'; } catch (e) { alert("Sai!"); } };
    window.moTaiKhoan = () => { document.getElementById('profile-container').innerHTML = `<h2>Tài Khoản</h2><input id="pPh" class="modal-input" value="${userProfile.phone||''}" placeholder="SĐT"><textarea id="pAd" class="modal-input" rows="2" placeholder="Địa chỉ">${userProfile.address||''}</textarea><button class="btn-login" onclick="window.saveP()">Lưu Thông Tin</button>`; document.getElementById('profile-modal').style.display='block'; };
    window.saveP = async () => { await setDoc(doc(db, "Users", currentUser.email), { phone: document.getElementById('pPh').value, address: document.getElementById('pAd').value }, { merge: true }); document.getElementById('profile-modal').style.display='none'; Swal.fire("Đã lưu!"); };
    window.logout = () => signOut(auth);

    init();
</script>
<script type="text/javascript"> function googleTranslateElementInit() { new google.translate.TranslateElement({ pageLanguage: 'vi', includedLanguages: 'en,zh-CN,ko,ru', layout: google.translate.TranslateElement.InlineLayout.SIMPLE, autoDisplay: false }, 'google_translate_element'); } </script>
<script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
