<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phở Bụt - Veggie Saigon</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 100px; color: #333; }
        .header { background: #2e7d32; color: white; padding: 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 2em; }
        .header p { margin: 5px 0 0; font-style: italic; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .section-title { color: #2e7d32; border-left: 4px solid #e67e22; padding-left: 10px; margin: 25px 0 15px; font-size: 1.3em; font-weight: bold; }
        
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 10px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .menu-list { display: flex; flex-direction: column; gap: 20px; }
        .menu-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .menu-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; background: #ddd; }
        .card-content { padding: 15px; }
        .name-vi { margin: 0 0 5px 0; font-size: 1.2em; color: #111; font-weight: bold; }
        .name-en { margin: 0 0 10px 0; font-size: 0.9em; color: #666; font-style: italic; }
        .price { color: #d35400; font-weight: bold; font-size: 1.2em; margin-bottom: 15px; }
        
        .btn-add { background: #2e7d32; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1em; width: 100%; }
        .btn-add:active { background: #1b5e20; }

        .cart-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; border-top: 2px solid #2e7d32; z-index: 1000; cursor: pointer; }
        .cart-info { font-size: 1em; color: #333; line-height: 1.4; }
        .cart-total { color: #d35400; font-weight: bold; font-size: 1.2em; }
        .btn-view-cart { background: #e67e22; color: white; padding: 10px 20px; border-radius: 25px; font-weight: bold; font-size: 1em; border: none; cursor: pointer;}

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); }
        .modal-content { background-color: #fff; margin: 15% auto; padding: 20px; width: 90%; max-width: 400px; border-radius: 15px; position: relative; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px dashed #ccc; padding-bottom: 10px; font-size: 0.95em; }
        .btn-checkout-zalo { background: #0068ff; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 1.1em; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>🙏 Phở Bụt</h1>
    <p>Veggie Saigon - Tứ Diệu Đế</p>
</div>

<div class="container">
    <div class="section-title">🎥 Pháp Âm Tỉnh Thức</div>
    <div id="video-list"></div>

    <div class="section-title">🍜 Thực Đơn</div>
    <div id="menu-list" class="menu-list">
        <p id="loading-msg" style="text-align:center; color:#888;">Đang dọn lên mâm...</p>
    </div>

    <div class="section-title">🏠 Trạm Dừng Chân</div>
    <div id="location-list" style="text-align:center; color:#555; line-height: 1.5; margin-bottom: 20px;"></div>
</div>

<div class="cart-bar" onclick="window.moGioHang()">
    <div class="cart-info">
        🛒 <b><span id="cart-count">0</span> món</b> <br>
        <span class="cart-total" id="cart-total">0đ</span>
    </div>
    <button class="btn-view-cart">Xem Đơn 📋</button>
</div>

<div id="cart-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="window.dongGioHang()">&times;</span>
        <h2 style="color: #2e7d32; margin-top: 0;">🛒 Giỏ Hàng</h2>
        <div id="cart-items-list" style="max-height: 250px; overflow-y: auto; margin-bottom: 15px;"></div>
        <h3 style="color: #d35400; text-align: right; border-top: 2px solid #eee; padding-top: 10px;">Tổng: <span id="modal-total">0đ</span></h3>
        <button class="btn-checkout-zalo" onclick="window.guiZalo()">💬 Copy Đơn & Mở Zalo</button>
        <p style="font-size: 0.85em; color: #666; text-align: center; margin-top: 10px;">Hệ thống sẽ copy đơn, bạn chỉ cần bấm "Dán" vào khung chat Zalo là xong!</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA0zujbTZbHe_7gAe_y9QkrcR4qXKC6Abo",
      authDomain: "phobut-95574.firebaseapp.com",
      projectId: "phobut-95574",
      storageBucket: "phobut-95574.firebasestorage.app",
      messagingSenderId: "588108977874",
      appId: "1:588108977874:web:91eaa1d51fa3ddfbf6ff0b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    window.gioHang = {}; 
    let tongTienGioHang = 0;

    async function chayWeb() {
        try {
            const bSnap = await getDocs(collection(db, "Buddha"));
            const videoDiv = document.getElementById('video-list');
            bSnap.forEach(doc => {
                const link = doc.data().bat_chanh_dao;
                if(link) {
                    const id = link.includes('v=') ? link.split('v=')[1].split('&')[0] : link.split('/').pop();
                    videoDiv.innerHTML = `<div class="video-container"><iframe src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe></div>`;
                }
            });

            const mSnap = await getDocs(collection(db, "Menus"));
            const menuDiv = document.getElementById('menu-list');
            menuDiv.innerHTML = "";
            
            mSnap.forEach(doc => {
                const m = doc.data();
                const tenVi = String(m.ten_tieng_viet || 'Món chay');
                const tenEn = String(m.ten_tieng_anh || '');
                const gia = Number(m.gia_tien) || 0;
                const hinh = m.hinh_anh ? String(m.hinh_anh) : "https://via.placeholder.com/500x500?text=Veggie+Saigon";
                const tenAnToan = tenVi.replace(/['"]/g, '');

                menuDiv.innerHTML += `
                    <div class="menu-card">
                        <img src="${hinh}" alt="Hình món ăn" loading="lazy">
                        <div class="card-content">
                            <h3 class="name-vi">${tenVi}</h3>
                            <p class="name-en">${tenEn}</p>
                            <p class="price">${gia.toLocaleString()}đ</p>
                            <button class="btn-add" onclick="window.themVaoGio('${tenAnToan}', ${gia}, event)">➕ Thêm vào giỏ</button>
                        </div>
                    </div>
                `;
            });

            const lSnap = await getDocs(collection(db, "Locations"));
            const locDiv = document.getElementById('location-list');
            locDiv.innerHTML = "";
            lSnap.forEach(doc => {
                const l = doc.data();
                locDiv.innerHTML += `<strong>${l.ten_quan || 'Veggie Saigon'}</strong><br>📍 ${l.dia_chi || ''}`;
            });
        } catch(error) {
            console.error(error);
            document.getElementById('loading-msg').innerHTML = "Lỗi kết nối. Vui lòng tải lại trang!";
        }
    }

    window.themVaoGio = (ten, gia, event) => {
        event.stopPropagation();
        if (window.gioHang[ten]) window.gioHang[ten].soLuong++;
        else window.gioHang[ten] = { gia: gia, soLuong: 1 };
        
        let tongSoLuong = 0;
        tongTienGioHang = 0;
        for (let mon in window.gioHang) {
            tongSoLuong += window.gioHang[mon].soLuong;
            tongTienGioHang += (window.gioHang[mon].soLuong * window.gioHang[mon].gia);
        }

        document.getElementById('cart-count').innerText = tongSoLuong;
        document.getElementById('cart-total').innerText = tongTienGioHang.toLocaleString() + 'đ';
        
        const btn = event.target;
        btn.innerHTML = "✅ Đã thêm";
        btn.style.background = "#e67e22";
        setTimeout(() => { btn.innerHTML = "➕ Thêm vào giỏ"; btn.style.background = "#2e7d32"; }, 1000);
    };

    window.moGioHang = () => {
        const listDiv = document.getElementById('cart-items-list');
        listDiv.innerHTML = "";
        if(Object.keys(window.gioHang).length === 0) {
            listDiv.innerHTML = "<p style='text-align:center; color:#888;'>Giỏ hàng đang trống.</p>";
        } else {
            for (let mon in window.gioHang) {
                let sl = window.gioHang[mon].soLuong;
                let gia = window.gioHang[mon].gia;
                listDiv.innerHTML += `
                    <div class="cart-item">
                        <div><b>${mon}</b> <br> <small style="color:#666;">${gia.toLocaleString()}đ x ${sl}</small></div>
                        <div style="font-weight:bold; color:#d35400;">${(sl * gia).toLocaleString()}đ</div>
                    </div>
                `;
            }
        }
        document.getElementById('modal-total').innerText = tongTienGioHang.toLocaleString() + 'đ';
        document.getElementById('cart-modal').style.display = "block";
    };

    window.dongGioHang = () => document.getElementById('cart-modal').style.display = "none";

    window.guiZalo = () => {
        if(Object.keys(window.gioHang).length === 0) {
            alert("Bạn chưa chọn món ăn nào!");
            return;
        }

        let donZalo = "🙏 Chào Veggie Saigon, mình đặt món:\n\n";
        for (let mon in window.gioHang) {
            donZalo += "- " + mon + ": " + window.gioHang[mon].soLuong + " phần\n";
        }
        donZalo += "\n💰 Tổng cộng: " + tongTienGioHang.toLocaleString() + "đ\nXin cảm ơn!";

        const copyText = (text) => {
            const textarea = document.createElement("textarea");
            textarea.value = text;
            textarea.style.position = "fixed";
            textarea.style.opacity = "0";
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand("copy");
                alert("✅ Đã chép đơn hàng! Zalo sẽ mở lên ngay, bạn hãy chọn DÁN (PASTE) để gửi nhé.");
            } catch (err) {
                alert("Bạn vui lòng copy đơn này và gửi qua Zalo nhé: \n\n" + text);
            }
            document.body.removeChild(textarea);
            window.location.href = "https://zalo.me/0909108890";
        };

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(donZalo).then(() => {
                alert("✅ Đã chép đơn hàng! Zalo sẽ mở lên ngay, bạn hãy chọn DÁN (PASTE) để gửi nhé.");
                window.location.href = "https://zalo.me/0909108890";
            }).catch(err => copyText(donZalo));
        } else {
            copyText(donZalo);
        }
    };

    chayWeb();
</script>
</body>
</html>
