<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoBut - Veggie Saigon</title>
</head>
<body style="font-family: Arial, sans-serif; background: #f0f2f5; margin: 0; text-align: center; padding-top: 50px;">

    <div style="background: #2e7d32; color: white; padding: 20px; border-radius: 10px; margin: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
        <h1 style="margin: 0; font-size: 2em;">🙏 Phở Bụt Đang Tải...</h1>
        <p>Nếu bạn nhìn thấy khung màu xanh này, nghĩa là trang web không bị lỗi trắng trơn nữa!</p>
    </div>
    
    <div id="menu-list" style="margin-top: 30px; color: #d35400; font-weight: bold; font-size: 1.2em;">
        Đang kết nối kho dữ liệu...
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA0zujbTZbHe_7gAe_y9QkrcR4qXKC6Abo",
      authDomain: "phobut-95574.firebaseapp.com",
      projectId: "phobut-95574",
      storageBucket: "phobut-95574.firebasestorage.app",
      messagingSenderId: "588108977874",
      appId: "1:588108977874:web:91eaa1d51fa3ddfbf6ff0b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function testData() {
        try {
            const mSnap = await getDocs(collection(db, "Menus"));
            let html = "";
            mSnap.forEach(doc => {
                html += `<p style="color:#2e7d32;">✅ Tải thành công món: ${doc.data().ten_tieng_viet}</p>`;
            });
            document.getElementById('menu-list').innerHTML = html;
        } catch(error) {
            document.getElementById('menu-list').innerHTML = "❌ Lỗi kết nối Firebase: " + error.message;
        }
    }
    
    testData();
</script>
</body>
</html>
