<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoBut - Veggie Saigon</title>
    <style>
        :root { --primary: #2e7d32; --accent: #e67e22; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; color: #333; }
        
        /* Tiêu đề trang */
        .header { background: var(--primary); color: white; padding: 30px 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 2.2em; letter-spacing: 1px; }
        .header p { margin: 8px 0 0; opacity: 0.9; font-size: 1.1em; font-style: italic; }
        
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .section-title { color: var(--primary); border-left: 5px solid var(--accent); padding-left: 15px; margin: 30px 0 20px; font-size: 1.5em; font-weight: bold; }
        
        /* Video Phật Học */
        .video-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.08); max-width: 800px; margin: 0 auto 30px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* Lưới Menu: 1 cột (Phone), 2-3 cột (Tablet), 4 cột (Desktop) */
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 600px) { .menu-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 900px) { .menu-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1200px) { .menu-grid { grid-template-columns: repeat(4, 1fr); } }
        
        .menu-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; transition: transform 0.3s, box-shadow 0.3s; }
        .menu-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .menu-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #eee; }
        
        .card-content { padding: 15px; text-align: center; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; }
        .name-vi { margin: 0 0 5px 0; font-size: 1.2em; color: #2c3e50; font-weight: 700; line-height: 1.3; }
        .name-en { margin: 0 0 10px 0; font-size: 0.95em; color: #7f8c8d; font-style: italic; flex-grow: 1; }
        .price { color: #d35400; font-weight: 900; font-size: 1.3em; margin: 10px 0; }
        
        .btn-add { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: 0.2s; width: 100%; }
        .btn-add:active { transform: scale(0.95); background: #1b5e20; }

        /* Thanh Giỏ Hàng Thông Minh */
        .cart-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.15); display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-sizing: border-box; border-top: 2px solid var(--primary); }
        .cart-info { font-size: 1.1em; color: #333; line-height: 1.4; }
        .cart-total { color: #d35400; font-weight: bold; font-size: 1.2em; }
        .btn-checkout { background: var(--accent); color: white; padding: 12px 25px; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 1.1em; box-shadow: 0 4px 15px rgba(230, 126, 34, 0.4); transition: 0.3s; display: inline-block; }
        .btn-checkout:hover { background: #d35400; transform: translateY(-2px); }
        
        .location-info { font-size: 1em; color: #555; line-height: 1.6; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="header">
    <h1>🙏 Phở Bụt</h1>
    <p>Veggie Saigon - Tứ Diệu Đế</p>
</div>

<div class="container">
    <div class="section-title">🎥 Pháp Âm Tỉnh Thức</div>
    <div id="video-list"></div>

    <div class="section-title">🍜 Thực Đơn / Menu</div>
    <div id="menu-list" class="menu-grid">
        <p style="text-align:center; color:#999; grid-column: 1 / -1; font-size: 1.2em;">Đang dọn lên mâm...</p>
    </div>

    <div class="section-title" style="text-align: center; border: none;">🏠 Trạm Dừng Chân</div>
    <div id="location-list" class="location-info"></div>
</div>

<div class="cart-bar">
    <div class="cart-info">
        🛒 <b><span id="cart-count">0</span> món</b> <br>
        <span class="cart-total" id="cart-total">0đ</span>
    </div>
    <a href="https://zalo.me/0909108890" id="zalo-link" class="btn-checkout" target="_blank">
        💬 Đặt qua Zalo
    </a>
</div>

    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA0zujbTZbHe_7gAe_y9QkrcR4qXKC6Abo",
      authDomain: "phobut-95574.firebaseapp.com",
      projectId: "phobut-95574",
      storageBucket: "phobut-95574.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // TÚI ĐỰNG GIỎ HÀNG
    window.gioHang = {}; 
    let tongSoLuong = 0;
    let tongTien = 0;

    async function loadWeb() {
        try {
            // Tải Video
            const bSnap = await getDocs(collection(db, "Buddha"));
            bSnap.forEach(doc => {
                const link = doc.data().bat_chanh_dao;
                if(link) {
                    const id = link.includes('v=') ? link.split('v=')[1].split('&')[0] : link.split('/').pop();
                    document.getElementById('video-list').innerHTML = `
                        <div class="video-card">
                            <div class="video-container"><iframe src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe></div>
                        </div>`;
                }
            });

            // Tải Thực đơn
            const mSnap = await getDocs(collection(db, "Menus"));
            const menuDiv = document.getElementById('menu-list');
            menuDiv.innerHTML = "";
            
            mSnap.forEach(doc => {
                const m = doc.data();
                const defaultImg = "https://via.placeholder.com/400x400?text=Veggie+Saigon";
                const tenMon = m.ten_tieng_viet || 'Món chay';
                const tenEn = m.ten_tieng_anh || '';
                const giaTien = Number(m.gia_tien) || 0;
                
                menuDiv.innerHTML += `
                    <div class="menu-card">
                        <img src="${m.hinh_anh || defaultImg}" alt="${tenMon}" loading="lazy">
                        <div class="card-content">
                            <div>
                                <h3 class="name-vi">${tenMon}</h3>
                                <p class="name-en">${tenEn}</p>
                            </div>
                            <div>
                                <p class="price">${giaTien.toLocaleString()}đ</p>
                                <button class="btn-add" onclick="themVaoGio('${tenMon.replace(/'/g, "\\'")}', ${giaTien})">➕ Thêm vào giỏ</button>
                            </div>
                        </div>
                    </div>`;
            });

            // Tải Địa chỉ
            const lSnap = await getDocs(collection(db, "Locations"));
            const locDiv = document.getElementById('location-list');
            locDiv.innerHTML = "";
            lSnap.forEach(doc => {
                const l = doc.data();
                locDiv.innerHTML += `<strong>${l.ten_quan || 'Veggie Saigon'}</strong><br>📍 ${l.dia_chi || ''}`;
            });

        } catch(e) {
            console.error(e);
            document.getElementById('menu-list').innerHTML = "<p>Lỗi tải thực đơn. Vui lòng thử lại!</p>";
        }
    }

    // HÀM THÊM VÀO GIỎ & TẠO TIN NHẮN ZALO
    window.themVaoGio = (ten, gia) => {
        // Nếu món đã có trong giỏ thì cộng thêm 1, chưa có thì tạo mới
        if (window.gioHang[ten]) {
            window.gioHang[ten].soLuong++;
        } else {
            window.gioHang[ten] = { gia: gia, soLuong: 1 };
        }
        capNhatGiaoDienGioHang();
    };

    function capNhatGiaoDienGioHang() {
        tongSoLuong = 0;
        tongTien = 0;
        
        // Cấu trúc tin nhắn sẽ gửi qua Zalo
        let donHangZalo = "🙏 Chào Veggie Saigon, mình muốn đặt các món sau:\n\n";
        
        for (let mon in window.gioHang) {
            let sl = window.gioHang[mon].soLuong;
            let gia = window.gioHang[mon].gia;
            tongSoLuong += sl;
            tongTien += (sl * gia);
            donHangZalo += `- ${mon}: ${sl} phần\n`;
        }
        
        donHangZalo += `\n💰 Tổng cộng: ${tongTien.toLocaleString()}đ\nXin cảm ơn!`;

        // Cập nhật số liệu lên màn hình
        document.getElementById('cart-count').innerText = tongSoLuong;
        document.getElementById('cart-total').innerText = tongTien.toLocaleString() + 'đ';
        
        // Cập nhật link Zalo (Mã hóa tin nhắn để có dấu xuống dòng chuẩn)
        const linkZalo = "https://z
