                document.getElementById('location-area').innerHTML = `🏠 <b>${l.ten_quan || 'Veggie Saigon'}</b><br>📍 ${l.dia_chi || ''}`;
            });

        } catch (error) {
            console.error(error);
            document.getElementById('menu-area').innerHTML = "Lỗi kết nối Firebase. Hãy kiểm tra lại!";
        }
