<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phở Bụt - Ẩm Thực Chay Tỉnh Thức</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 80px; color: #333; }
        .header { background: #2e7d32; color: white; padding: 30px 20px; text-align: center; border-bottom: 4px solid #e67e22; }
        .auth-bar { background: #1b5e20; color: white; padding: 10px; text-align: right; font-size: 0.85em; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        
        /* Menu Card */
        .menu-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 20px; transition: 0.3s; }
        .menu-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
        .card-content { padding: 15px; text-align: center; }
        .card-content h3 { margin: 0 0 10px; color: #2e7d32; font-size: 1.2em; }
        .price { color: #d35400; font-weight: bold; font-size: 1.2em; margin-bottom: 15px; }
        .btn-add { background: #2e7d32; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1em; }
        .btn-add:active { background: #1b5e20; transform: scale(0.98); }

        /* Cart Bar */
        .cart-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-top: 2px solid #2e7d32; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); box-sizing: border-box; z-index: 100; }
        .cart-info { font-size: 1em; }
        .btn-checkout { background: #e67e22; color: white; border: none; padding: 10px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; }

        /* Login Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; }
        .modal-content { background: white; margin: 20% auto; padding: 25px; width: 85%; max-width: 350px; border-radius: 15px; position: relative; }
        .modal-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #2e7d32; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="auth-bar" id="auth-status">
    Đang kiểm tra duyên lành...
</div>

<div class="header">
    <h1 style="margin:0;">🌱 Phở Bụt</h1>
    <p style="margin:5px 0 0; opacity:0.9; font-style:italic;">Ẩm thực chay tinh khiết & tỉnh thức</p>
</div>

<div class="container" id="menu-list">
    <p style="text-align:center; color:#888;">Đang tải thực đơn, con đợi xíu nghen...</p>
</div>

<div class="cart-bar">
    <div class="cart-info">🛒 <b id="cart-count">0</b> món | <span id="cart-total" style="color:#d35400; font-weight:bold;">0đ</span></div>
    <button class="btn-checkout" onclick="window.datHang()">Đặt Đơn 🙏</button>
</div>

<div id="login-modal" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0; color:#2e7d32; text-align:center;">🙏 Đăng Nhập</h2>
        <input type="email" id="email" class="modal-input" placeholder="Nhập Email của con">
        <input type="password" id="pass" class="modal-input" placeholder="Mật khẩu (ít nhất 6 ký tự)">
        <button class="btn-login" onclick="window.xuLyAuth()">Vào Bếp</button>
        <p style="font-size:0.75em; color:#888; text-align:center; margin-top:10px;">Nếu chưa có tài khoản, hệ thống sẽ tự tạo mới cho con lần đầu nghen.</p>
        <button onclick="window.dongModal()" style="width:100%; background:none; border:none; color:#999; margin-top:10px; cursor:pointer;">Để sau nghen</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Cấu hình Firebase
    const firebaseConfig = { apiKey: "AIzaSyA0zujbTZbHe_7gAe_y9QkrcR4qXKC6Abo", authDomain: "phobut-95574.firebaseapp.com", projectId: "phobut-95574" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let current_user = null;
    let cart = {};

    // 1. Kiểm tra đăng nhập
    onAuthStateChanged(auth, (user) => {
        const bar = document.getElementById('auth-status');
        if (user) {
            current_user = user;
            bar.innerHTML = `Chào con, <b>${user.email}</b> | <span onclick="window.logout()" style="text-decoration:underline; cursor:pointer;">Thoát</span>`;
        } else {
            current_user = null;
            bar.innerHTML = `<span onclick="window.moLogin()" style="cursor:pointer; border:1px solid white; padding:2px 8px; border-radius:5px;">Đăng nhập để đặt hàng</span>`;
        }
    });

    window.moLogin = () => document.getElementById('login-modal').style.display = 'block';
    window.dongModal = () => document.getElementById('login-modal').style.display = 'none';

    window.xuLyAuth = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if(!email || !pass) return alert("Con bận điền đủ thông tin nghen!");
        
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            window.dongModal();
        } catch (err) {
            if (err.code === 'auth/invalid-credential' || err.code === 'auth/user-not-found') {
                try {
                    await createUserWithEmailAndPassword(auth, email, pass);
                    window.dongModal();
                } catch (e) { alert("Lỗi tạo tài khoản: " + e.message); }
            } else { alert("Lỗi đăng nhập: " + err.message); }
        }
    };

    window.logout = () => signOut(auth);

    // 2. Tải thực đơn
    async function fetchMenu() {
        const snap = await getDocs(collection(db, "Menus"));
        const list = document.getElementById('menu-list');
        list.innerHTML = "";
        if(snap.empty) list.innerHTML = "<p style='text-align:center;'>Bếp chưa dọn món ráo trọi, con quay lại sau nghen!</p>";
        
        snap.forEach(doc => {
            const m = doc.data();
            list.innerHTML += `
                <div class="menu-card">
                    <img src="${m.hinh_anh}" alt="${m.ten_tieng_viet}">
                    <div class="card-content">
                        <h3>${m.ten_tieng_viet}</h3>
                        <p class="price">${m.gia_tien.toLocaleString()}đ</p>
                        <button class="btn-add" onclick="window.addToCart('${m.ten_tieng_viet}', ${m.gia_tien})">➕ Thêm vào giỏ</button>
                    </div>
                </div>`;
        });
    }

    // 3. Giỏ hàng
    window.addToCart = (ten, gia) => {
        if(cart[ten]) cart[ten].sl++;
        else cart[ten] = { gia, sl: 1 };
        updateCartUI();
    };

    function updateCartUI() {
        let count = 0, total = 0;
        for(let key in cart) { count += cart[key].sl; total += (cart[key].sl * cart[key].gia); }
        document.getElementById('cart-count').innerText = count;
        document.getElementById('cart-total').innerText = total.toLocaleString() + 'đ';
    }

    // 4. Gửi đơn hàng
    window.datHang = async () => {
        if(!current_user) {
            Swal.fire("Con bận đăng nhập đặng bếp biết ai đặt món nghen!");
            window.moLogin();
            return;
        }
        if(Object.keys(cart).length === 0) return Swal.fire("Giỏ hàng đang trống, con chọn món đã nghen!");

        try {
            await addDoc(collection(db, "Orders"), {
                khach_hang: current_user.email,
                chi_tiet: cart,
                thoi_gian: serverTimestamp(),
                trang_thai: "Đang chờ"
            });
            Swal.fire("🙏 Đã nhận đơn!", "Bếp Phở Bụt đang bắt đầu làm cho con đây.", "success");
            cart = {}; updateCartUI();
        } catch (e) { alert("Lỗi gửi đơn: " + e.message); }
    };

    fetchMenu();
</script>
</body>
</html>
