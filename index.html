<script type="module">
    // ... (Giữ nguyên các hàm khởi tạo)

    window.confirmOrder = async () => {
        const ph = document.getElementById('sPh').value, ad = document.getElementById('sAd').value; 
        if(!ph || !ad) return alert("Vui lòng điền đủ thông tin!");
        
        const btn = document.getElementById('btn-sub'); btn.disabled = true; btn.innerText = "Đang kiểm tra...";

        try {
            // Lấy thông tin giá & VAT hiện tại từ hệ thống
            const infoSnap = await getDoc(doc(db, "Settings", "info"));
            const vatRate = infoSnap.exists() ? (infoSnap.data().vat_rate || 0) : 0;
            
            const snapMenu = await getDocs(collection(db, "Menus")); 
            const menuData = {};
            snapMenu.forEach(d => { menuData[d.data().ten_tieng_viet] = { ton: d.data().ton_kho||0, von: d.data().gia_von||0 }; });
            
            let err = ""; let subTotal = 0, totalV = 0;
            for(let k in cart) { 
                if(cart[k].sl > menuData[k].ton) err += `- ${k} (còn ${menuData[k].ton})\n`;
                subTotal += cart[k].sl * cart[k].gia; 
                totalV += cart[k].sl * menuData[k].von; 
            }
            
            if(err) { btn.disabled = false; btn.innerText="Đặt Đơn"; return Swal.fire("Hết món", err, "error"); }

            // TÍNH TOÁN VAT
            const vatAmount = Math.round(subTotal * (vatRate / 100));
            const finalTotal = subTotal + vatAmount;

            await addDoc(collection(db, "Orders"), { 
                khach_hang: currentUser.email, 
                dien_thoai: ph, 
                dia_chi: ad, 
                chi_tiet: cart, 
                gia_tam_tinh: subTotal,
                tien_thue: vatAmount,
                phan_tram_thue: vatRate,
                tong_tien: finalTotal, 
                tong_von: totalV, 
                thoi_gian: serverTimestamp(), 
                trang_thai: "Chờ xác nhận" 
            });

            Swal.fire("Thành công!", "Đơn hàng đã được ghi nhận.", "success"); 
            cart = {}; updateUI(); document.getElementById('checkout-modal').style.display='none';
        } catch (e) { alert(e.message); btn.disabled = false; }
    };

    // ... (Giữ nguyên các hàm còn lại)
</script>
